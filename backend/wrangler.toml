name = "ascend-backend"
main = "worker.js"
compatibility_date = "2024-09-01"

# Cloudflare-managed observability — ships request logs + traces to the
# dashboard at no cost. Pairs with the structured _accessLog() lines emitted
# by worker.js so the dashboard logs are filterable by route/outcome/uid hash.
[observability]
enabled = true

# CPU budget per request. Workers Paid plan default ceiling is 30000ms (30s);
# Workers Free is 10ms and ignores this knob. The hottest path is /sync
# (8 items × 10 cursor pages, each parsing a 250-transaction Plaid response
# plus AES-GCM access-token decrypt) — measured around 200-500ms CPU in
# practice. 5000ms (5s) gives ~10x headroom for outlier requests while
# still catching runaway loops as a clean kill instead of silently hitting
# the 30s plan ceiling and burning quota.
[limits]
cpu_ms = 5000

# Non-secret config knobs. Use [vars] for values that should be inspectable
# without rotating a secret (e.g. dashboard view). Anything that grants
# access (PLAID_SECRET, ANTHROPIC_KEY, VAPID_PRIVATE_KEY, ENROLLMENT_KEY,
# ENCRYPTION_KEY) stays in `wrangler secret put` — never here.
[vars]
# Default Anthropic per-feature daily cap and per-minute burst cap. Overrides
# the constants in worker.js so the operator can tune without redeploy.
# Bumping these costs money — leave conservative unless you're sure.
ANTHROPIC_DAILY_CAP = "50"
ANTHROPIC_BURST_CAP = "10"
# Global daily cap on /enroll across all IPs. Defense-in-depth against
# botnets that stay under the per-IP gate.
ENROLL_GLOBAL_DAY_CAP = "500"

# After running `wrangler kv namespace create ASCEND_KV`, paste the id below.
#
# ⚠ FORKERS: this id points at the upstream operator's Cloudflare KV
# namespace. It's not a secret (auth still requires their API token), but
# you MUST replace it with your own before deploying — otherwise wrangler
# will fail with "namespace not in your account". Run
# `wrangler kv namespace create ASCEND_KV` and paste the new id here.
# Don't commit the change back upstream.
[[kv_namespaces]]
binding = "ASCEND_KV"
id = "44a23ecf3805442a979f201d43834ea6"

# Scheduled trigger — runs every 15 minutes to deliver any scheduled
# pushes whose time has arrived. Cheap; idles when nothing's due.
[triggers]
crons = ["*/15 * * * *"]

# Custom domain (optional). Once you have api.<your-domain> pointing at
# Cloudflare and the domain is on your account, uncomment to bind the
# Worker to it. After binding, also set workers_dev = false (below) so
# the *.workers.dev URL stops being a public bypass route.
#
# [[routes]]
# pattern = "api.your-domain.com/*"
# custom_domain = true
#
# workers_dev = false

# Secrets are NOT set here. Set them via the CLI (one-time) so they don't end up in git:
#   wrangler secret put PLAID_CLIENT_ID
#   wrangler secret put PLAID_SECRET
#   wrangler secret put PLAID_ENV          # value: sandbox | development | production
#   wrangler secret put API_KEY            # any random string; the PWA will send this as Bearer
#   wrangler secret put ENCRYPTION_KEY     # base64 32-byte key (run: openssl rand -base64 32)
#   wrangler secret put ALLOWED_ORIGIN     # the URL of your deployed PWA, e.g. https://ascend-yourname.netlify.app
#
# Web Push (optional — enables background pushes when the app is closed):
#   wrangler secret put VAPID_PUBLIC_KEY   # base64url-encoded P-256 public key (uncompressed, 65 bytes)
#   wrangler secret put VAPID_PRIVATE_KEY  # base64url-encoded P-256 private key (32 bytes)
#   wrangler secret put VAPID_SUBJECT      # mailto: or https: URL identifying the sender
#
# Generate VAPID keys: `node -e "const c=require('crypto');const k=c.generateKeyPairSync('ec',{namedCurve:'prime256v1'});const pub=k.publicKey.export({format:'jwk'});const prv=k.privateKey.export({format:'jwk'});console.log('VAPID_PUBLIC_KEY:',Buffer.from([4,...Buffer.from(pub.x,'base64url'),...Buffer.from(pub.y,'base64url')]).toString('base64url'));console.log('VAPID_PRIVATE_KEY:',prv.d);"`
