/* ================ FINANCIAL CALENDAR ================
   Important upcoming dates: federal tax deadlines, IRA/HSA contribution
   cutoffs, estimated tax dates, savings/goal target dates, and any custom
   dates the user adds. Sorted ascending, filtered to today + future.
*/

function _startOfDay(d) {
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}
function daysUntil(date) {
  const today = _startOfDay(new Date());
  return Math.round((date - today) / 86400000);
}
function dayLabel(date) {
  const days = daysUntil(date);
  if (days < 0) return `${Math.abs(days)}d ago`;
  if (days === 0) return "Today";
  if (days === 1) return "Tomorrow";
  if (days < 7)   return `In ${days} days`;
  if (days < 30)  return `In ${Math.round(days/7)} weeks`;
  if (days < 365) return `In ${Math.round(days/30)} months`;
  return `In ${Math.round(days/365)} years`;
}

function computeFinancialCalendar(opts) {
  opts = opts || {};
  const horizonMonths = opts.horizonMonths || 18;
  const now = new Date();
  const today = _startOfDay(now);
  const cutoff = new Date(today);
  cutoff.setMonth(cutoff.getMonth() + horizonMonths);
  const out = [];
  const dismissed = DB.dismissedCalendarBuiltins || {};

  // === Built-in tax / contribution dates ===
  // Generate for this year + next year so the IRA contribution play (which
  // pays into the prior tax year through Apr 15) is visible year-round.
  const years = [now.getFullYear(), now.getFullYear() + 1];
  for (const y of years) {
    const taxId = `builtin:tax-${y}`;
    if (!dismissed[taxId]) {
      out.push({
        id: taxId, builtin: true,
        date: new Date(y, 3, 15), // Apr 15
        icon: "🧾",
        title: `Federal tax day ${y}`,
        subtitle: `${y-1} tax return filing deadline (may shift to next business day)`,
        kind: "tax",
      });
    }
    const iraId = `builtin:ira-${y}`;
    if (!dismissed[iraId]) {
      out.push({
        id: iraId, builtin: true,
        date: new Date(y, 3, 15),
        icon: "🏦",
        title: `Last day to fund ${y-1} IRA`,
        subtitle: `Roth / Traditional / SEP IRA contributions for tax year ${y-1}`,
        kind: "tax",
      });
    }
    const hsaId = `builtin:hsa-${y}`;
    if (!dismissed[hsaId]) {
      out.push({
        id: hsaId, builtin: true,
        date: new Date(y, 3, 15),
        icon: "🏥",
        title: `Last day to fund ${y-1} HSA`,
        subtitle: `If HDHP-eligible — contributions to prior tax year`,
        kind: "tax",
      });
    }
    // Quarterly estimated taxes — relevant for 1099 / self-employed
    const estDates = [
      { m: 3, d: 15, q: "Q1" },
      { m: 5, d: 15, q: "Q2" },
      { m: 8, d: 15, q: "Q3" },
      { m: 0, d: 15, q: "Q4", nextYear: true },
    ];
    for (const ed of estDates) {
      const eyear = ed.nextYear ? y + 1 : y;
      const id = `builtin:est-${eyear}-q${ed.q}`;
      if (dismissed[id]) continue;
      out.push({
        id, builtin: true,
        date: new Date(eyear, ed.m, ed.d),
        icon: "📃",
        title: `Estimated tax ${ed.q} due`,
        subtitle: "For self-employment / 1099 / large investment gains",
        kind: "tax",
      });
    }
    // Year-end — last day for 401k / charitable / tax-loss harvesting
    const yeId = `builtin:year-end-${y}`;
    if (!dismissed[yeId]) {
      out.push({
        id: yeId, builtin: true,
        date: new Date(y, 11, 31),
        icon: "🎆",
        title: `${y} tax-year cutoff`,
        subtitle: "Last day for 401k contributions, charitable gifts, tax-loss harvesting",
        kind: "tax",
      });
    }
  }

  // === Goal target dates (if set) ===
  for (const g of (DB.goals || [])) {
    if (!g.targetDate) continue;
    const d = new Date(g.targetDate + "T00:00:00");
    if (isNaN(d)) continue;
    out.push({
      id: `goal:${g.id}`, builtin: false,
      date: d,
      icon: "🎯",
      title: `Goal: ${g.title}`,
      subtitle: g.note || "Goal target date",
      kind: "goal",
    });
  }

  // === Savings target dates (if set) ===
  for (const s of (DB.savings || [])) {
    if (!s.targetDate) continue;
    const d = new Date(s.targetDate + "T00:00:00");
    if (isNaN(d)) continue;
    out.push({
      id: `saving:${s.id}`, builtin: false,
      date: d,
      icon: s.emoji || "💰",
      title: `${s.name} target`,
      subtitle: `${fmt$0(s.current)} of ${fmt$0(s.target)} saved`,
      kind: "savings",
    });
  }

  // === User custom dates ===
  for (const d of (DB.calendarDates || [])) {
    const dt = new Date(d.date + "T00:00:00");
    if (isNaN(dt)) continue;
    out.push({
      id: `custom:${d.id}`, builtin: false, customId: d.id,
      date: dt,
      icon: d.icon || "📌",
      title: d.title,
      subtitle: d.note || "",
      kind: "custom",
    });
  }

  // Filter to (today..cutoff] and sort ascending
  return out
    .filter(e => e.date >= today && e.date <= cutoff)
    .sort((a,b) => a.date - b.date);
}

/* Confetti celebration */
function celebrate(intensity) {
  if (intensity == null) intensity = 1;
  if (DB.settings && DB.settings.celebrationsEnabled === false) return;
  if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  const cv = document.createElement("canvas");
  cv.className = "confetti-canvas";
  cv.width = window.innerWidth;
  cv.height = window.innerHeight;
  document.body.appendChild(cv);
  const ctx = cv.getContext("2d");
  const colors = ["#34C759","#007AFF","#FF9500","#AF52DE","#FFCC00","#FF2D55","#5AC8FA"];
  const N = Math.round(80 * intensity);
  const parts = Array.from({length: N}, () => ({
    x: cv.width / 2 + (Math.random() - 0.5) * 60,
    y: cv.height * 0.35,
    vx: (Math.random() - 0.5) * 12,
    vy: -8 - Math.random() * 8,
    g: 0.45 + Math.random() * 0.15,
    sz: 4 + Math.random() * 5,
    rot: Math.random() * Math.PI,
    vr: (Math.random() - 0.5) * 0.4,
    c: colors[(Math.random() * colors.length) | 0],
    life: 60 + Math.random() * 40,
  }));
  let frame = 0;
  (function tick() {
    frame++;
    ctx.clearRect(0, 0, cv.width, cv.height);
    let alive = false;
    for (const p of parts) {
      if (p.life <= 0) continue;
      alive = true;
      p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr; p.life--;
      ctx.save();
      ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.c;
      ctx.fillRect(-p.sz / 2, -p.sz / 2, p.sz, p.sz * 0.6);
      ctx.restore();
    }
    if (alive && frame < 200) requestAnimationFrame(tick);
    else cv.remove();
  })();
}

/* Goal hierarchy helpers */
function goalChildren(goalId) { return (DB.goals || []).filter(g => g.parentId === goalId); }
function goalParent(goalId) {
  const g = (DB.goals || []).find(x => x.id === goalId);
  if (!g || !g.parentId) return null;
  return (DB.goals || []).find(x => x.id === g.parentId) || null;

function goalChain(goalId) {
  const out = [];
  let cur = (DB.goals || []).find(g => g.id === goalId);

  while (cur && depth < 6) { out.unshift(cur); cur = goalParent(cur.id); depth++; }

/* --- Cashflow forecast (90-day projection) ---------------------- *
   Uses recurring tx + average daily discretionary (last 30 days, excluding
   recurring) to project a running balance. Starting balance is the sum of
   non-credit/loan account balances if connected, else 0.
*/
function startingBalance() {
  if ((DB.accounts || []).length) {
    return (DB.accounts || []).reduce((s, a) => {
      const t = a.type;
      if (t === "credit" || t === "loan") return s - (+a.balance_current || 0);
      return s + (+a.balance_current || 0);
    }, 0);
  }
  // Fallback: sum of savings goals' current
  return totalSaved();
}
function avgDailyDiscretionary() {
  // Average daily spend over the past 30 days
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 30);
  const ck = todayKey(cutoff);
  const recent = (DB.spend || []).filter(t => t.date >= ck && (+t.amount) > 0);
  const total = recent.reduce((a, t) => a + (+t.amount || 0), 0);
  return total / 30;
}
function cashflowProject(days) {
  if (days == null) days = 90;
  const points = [];
  let bal = startingBalance();
  const today = new Date();
  const dailyDisc = avgDailyDiscretionary();
  // Pre-compute monthly recurring contribution per day (averaged)
  const monthlyExp = recurringMonthlyTotal("expense");
  const monthlyInc = recurringMonthlyTotal("income");
  const dailyNetRecurring = (monthlyInc - monthlyExp) / 30;
  for (let i = 0; i <= days; i++) {
    const d = new Date(today); d.setDate(today.getDate() + i);
    bal += dailyNetRecurring - dailyDisc;
    points.push({ date: todayKey(d), balance: bal });
  }
  return points;
}
function cashflowSparkline(points, w, h) {
  if (w == null) w = 320; if (h == null) h = 90;
  if (!points.length) return "";
  const vals = points.map(p => p.balance);
  const min = Math.min(...vals, 0), max = Math.max(...vals, 0);
  const range = (max - min) || 1;
  const stepX = w / (vals.length - 1);
  const yz = h - ((0 - min) / range) * h;
  const pts = vals.map((v, i) => (i * stepX).toFixed(1) + "," + (h - ((v - min) / range) * h).toFixed(1)).join(" ");
  const ending = vals[vals.length - 1];
  const color = ending >= 0 ? "var(--green)" : "var(--red)";
  return (

function cashflowCardHtml() {

/* --- Year heatmap ----------------------------------------------- */
function yearHeatmap() {
  // 365 days back through today; intensity = % habits done that day
  const today = new Date();
  const cells = [];
  // Align grid so first column starts on a Sunday
  const start = new Date(today); start.setDate(today.getDate() - 364);
  // Pad to start on Sunday
  const padDays = start.getDay(); // 0..6
  for (let i = 0; i < padDays; i++) cells.push({ pad: true });
  for (let i = 0; i < 365; i++) {
    const d = new Date(start); d.setDate(start.getDate() + i);
    const k = todayKey(d);
    if (!DB.habits.length) { cells.push({ pad: false, level: 0, k }); continue; }
    const done = DB.habits.filter(h => h.type === "count" ? (h.log[k] || 0) >= (h.target || 1) : !!h.log[k]).length;
    const pct = done / DB.habits.length;
    const level = pct === 0 ? 0 : pct < 0.34 ? 1 : pct < 0.67 ? 2 : pct < 1 ? 3 : 4;
    cells.push({ pad: false, level, k, done, total: DB.habits.length });
  }
  return cells.map(c => {
    if (c.pad) return '<div class="heat-cell" style="visibility:hidden"></div>';
    const cls = c.level ? "l" + c.level : "";
    const title = c.k + " — " + (c.done || 0) + "/" + (c.total || 0);
    return '<div class="heat-cell ' + cls + '" title="' + esc(title) + '"></div>';
  }).join("");
}
function topStreaks(n) {
  if (n == null) n = 5;
  return (DB.habits || []).map(h => ({ name: h.name, emoji: h.emoji, streak: streakOf(h) }))
    .filter(x => x.streak > 0)
    .sort((a, b) => b.streak - a.streak)
    .slice(0, n);
}

/* --- Weekly reflection prompt ----------------------------------- *
   Surface a banner on Today on Sundays (and any day if user hasn't
   reflected in 7+ days). Dismissable for the week.
*/
function weeklyReviewDue() {
  const dow = new Date().getDay(); // 0=Sun
  const lastReflect = (DB.reflections || [])[0];
  const daysSince = lastReflect
    ? Math.floor((new Date() - new Date(lastReflect.date + "T00:00:00")) / 86400000)
    : 999;
  // dismissed tracker keyed by year-week
  const yk = (() => {
    const d = new Date(); d.setDate(d.getDate() - d.getDay()); // Sunday of this week
    return d.getFullYear() + "-W" + Math.ceil(((d - new Date(d.getFullYear(),0,1)) / 86400000 + 1) / 7);
  })();
  if ((DB.dismissedWeeklyReview || {})[yk]) return false;
  return dow === 0 || daysSince >= 7;
}
function dismissWeeklyReview() {
  if (!DB.dismissedWeeklyReview) DB.dismissedWeeklyReview = {};
  const d = new Date(); d.setDate(d.getDate() - d.getDay());
  const yk = d.getFullYear() + "-W" + Math.ceil(((d - new Date(d.getFullYear(),0,1)) / 86400000 + 1) / 7);
  DB.dismissedWeeklyReview[yk] = true;
  save(); render();
}
function weeklyReviewSheet() {
  // Stats for last week
  const today = new Date();
  const weekAgo = new Date(today); weekAgo.setDate(today.getDate() - 7);
  const wk = todayKey(weekAgo);
  const habitsHit = (DB.habits || []).reduce((s, h) => {
    let n = 0; const d = new Date(today);
    for (let i = 0; i < 7; i++) {
      const k = todayKey(d);
      if (h.type === "count" ? (h.log[k] || 0) >= (h.target || 1) : !!h.log[k]) n++;
      d.setDate(d.getDate() - 1);
    }
    return s + n;
  }, 0);
  const habitsPossible = (DB.habits || []).length * 7;
  const spendThisWeek = (DB.spend || []).filter(t => t.date >= wk && (+t.amount) > 0).reduce((a,t)=>a+(+t.amount||0), 0);
  const winsThisWeek = (DB.wins || []).filter(w => w.date >= wk).length;
  openSheet(
    '<h2>Weekly review</h2>' +
    '<p class="muted" style="font-size:13px;margin-bottom:14px">Five minutes. The compound interest of life.</p>' +
    '<div class="list" style="margin-bottom:12px">' +
      '<div class="row"><div class="lead">✅</div><div class="body"><div class="t1">' + habitsHit + ' / ' + habitsPossible + ' habit hits</div><div class="t2">past 7 days</div></div></div>' +
      '<div class="row"><div class="lead">\u{1F4B8}</div><div class="body"><div class="t1" data-priv="amount">' + fmt$0(spendThisWeek) + ' spent</div><div class="t2">past 7 days</div></div></div>' +
      '<div class="row"><div class="lead">⭐</div><div class="body"><div class="t1">' + winsThisWeek + ' wins logged</div><div class="t2">past 7 days</div></div></div>' +
    '</div>' +
    '<label>What went well?</label>' +
    '<textarea id="wr-good" rows="2" placeholder="One thing you\'re proud of..."></textarea>' +
    '<label>What didn\'t?</label>' +
    '<textarea id="wr-bad" rows="2" placeholder="One thing to change..."></textarea>' +
    '<label>Focus next week</label>' +
    '<textarea id="wr-next" rows="2" placeholder="One thing to prioritize..."></textarea>' +
    '<div class="actions">' +
      '<button class="btn secondary" onclick="dismissWeeklyReview();closeSheet()">Skip</button>' +
      '<button class="btn" id="wr-save">Save</button>' +
    '</div>'
  );
  $("#wr-save").addEventListener("click", () => {
    const good = $("#wr-good").value.trim();
    const bad  = $("#wr-bad").value.trim();
    const next = $("#wr-next").value.trim();
    const text = (good ? "✅ What worked: " + good + "\n\n" : "")
               + (bad  ? "⚠️ What didn\'t: " + bad + "\n\n" : "")
               + (next ? "→ Next week: " + next : "");
    if (!text) { dismissWeeklyReview(); closeSheet(); return; }
    (DB.reflections = DB.reflections || []).unshift({ id: uid(), text, date: todayKey(), createdAt: Date.now(), kind: "weekly" });
    dismissWeeklyReview();
    closeSheet();
    toast("✓ Weekly review saved");
  });
}

  maybeShowWhatsNew();

  if (DB.settings.autoSyncOnOpen && _backendReady() && (DB.items||[]).length > 0) {
    setTimeout(() => { syncNow().then(() => { surfacePendingDeposits(); }).catch(()=>{}); }, 800);
  } else {
    setTimeout(() => surfacePendingDeposits(), 1200);
  }
}

function surfacePendingDeposits() {
  const next = (DB.pendingDeposits || [])[0];
  if (next) reviewIncomeSheet(next);
}
init();
</script>
