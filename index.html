  const goals = (DB.goals||[]).filter(g => !g.done).slice(0,8).map(g => ({ title: g.title, tier: g.tier }));

  const ctx = {
    month: monthKey,
    income_this_month: incomeMonth,
    spending_by_category: Object.fromEntries(top),
    total_spend_this_month: top.reduce((s,[,v])=>s+v,0),
    last_month_spend: lastMonth,
    active_subscriptions: subs,
    savings_goals: savings,
    open_goals: goals,
  };

  const prompt = `You are a sharp, candid personal-finance and life coach helping the user (named ${esc(DB.user.name||"the user")}). Read their data below and give them 3-5 specific, actionable observations and 1-2 concrete next steps. Be warm but direct. Skip generic advice. Reference actual numbers and merchants from the data. Keep it under 250 words. No bullet points unless truly useful — prefer short paragraphs. End with a single sentence of encouragement.`;
  const txt = await fetchInsight(prompt, ctx);
  // Cache
  if (!DB.insights) DB.insights = [];
  DB.insights.unshift({ date: todayKey(), prompt_summary: "monthly spending review", response: txt, model: DB.settings.anthropicModel });
  DB.insights = DB.insights.slice(0, 12);
  await save();
  return txt;
}

/* ================ CALENDAR EXPORT (.ics) ================ */
function billsToIcs() {
  const subs = detectSubscriptions().filter(s => s.status === "active");
  if (!subs.length) return null;
  const stamp = (d) => d.replace(/-/g,"") + "T090000";
  const now = new Date();
  const dtNow = now.toISOString().replace(/[-:]/g,"").slice(0,15) + "Z";
  let ics = "BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Ascend//EN\r\nCALSCALE:GREGORIAN\r\n";
  for (const s of subs) {
    const start = stamp(s.next_predicted);
    let rrule = "FREQ=MONTHLY";
    if (s.frequency === "weekly")     rrule = "FREQ=WEEKLY";
    if (s.frequency === "biweekly")   rrule = "FREQ=WEEKLY;INTERVAL=2";
    if (s.frequency === "quarterly")  rrule = "FREQ=MONTHLY;INTERVAL=3";
    if (s.frequency === "yearly")     rrule = "FREQ=YEARLY";
    const uid = `ascend-${s.key.replace(/\s+/g,"-")}@local`;
    const summary = `${s.merchant} ($${s.avg_amount.toFixed(2)})`;
    ics += "BEGIN:VEVENT\r\n";
    ics += `UID:${uid}\r\n`;
    ics += `DTSTAMP:${dtNow}\r\n`;
    ics += `DTSTART:${start}\r\n`;
    ics += `DURATION:PT15M\r\n`;
    ics += `SUMMARY:${summary}\r\n`;
    ics += `RRULE:${rrule}\r\n`;
    ics += `BEGIN:VALARM\r\nACTION:DISPLAY\r\nDESCRIPTION:${summary}\r\nTRIGGER:-P1D\r\nEND:VALARM\r\n`;
    ics += "END:VEVENT\r\n";
  }
  ics += "END:VCALENDAR\r\n";
  return ics;
}
function exportBillsIcs() {
  const ics = billsToIcs();
  if (!ics) { toast("No subscriptions detected yet"); return; }
  const blob = new Blob([ics], { type: "text/calendar" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `ascend-bills-${todayKey()}.ics`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast("Calendar file downloaded");
}

/* ================ YEAR REVIEW + STREAK SHARE ================ */
function yearReview(year) {
  const y = year || new Date().getFullYear();
  const yPrefix = `${y}-`;
  // Habits
  let totalChecks = 0, perHabit = [];
  for (const h of (DB.habits||[])) {
    let n = 0;
    for (const k of Object.keys(h.log||{})) {
      if (k.startsWith(yPrefix)) {
        const v = h.log[k];
        const hit = h.type === "count" ? (v >= (h.target||1)) : !!v;
        if (hit) n++;
      }
    }
    totalChecks += n;
    perHabit.push({ name: h.name, emoji: h.emoji, count: n });
  }
  // Goals
  const goalsCompleted = (DB.goals||[]).filter(g => g.done && g.completedAt && new Date(g.completedAt).getFullYear() === y);
  // Spending
  const yearSpend = (DB.spend||[]).filter(t => t.date.startsWith(yPrefix));
  const yearOut = yearSpend.filter(t => +t.amount > 0).reduce((s,t)=>s+(+t.amount||0), 0);
  const yearIn  = yearSpend.filter(t => +t.amount < 0).reduce((s,t)=>s+Math.abs(+t.amount||0), 0);
  // Wins
  const winsYear = (DB.wins||[]).filter(w => w.date.startsWith(yPrefix));
  // Top streaks (current)
  const streaks = (DB.habits||[]).map(h => ({ name: h.name, emoji: h.emoji, streak: streakOf(h) })).sort((a,b)=>b.streak - a.streak).slice(0,5);

  return { year: y, totalChecks, perHabit: perHabit.sort((a,b)=>b.count-a.count), goalsCompleted, yearOut, yearIn, winsYear: winsYear.length, streaks };
}

function detectSubscriptions() {
  // Group plaid outflows by normalized merchant key
  const plaid = (DB.spend || []).filter(t => t.source === "plaid" && (+t.amount) > 0);
  const groups = {};
  for (const tx of plaid) {
    const k = (tx.note || tx.category || "").toLowerCase().replace(/[^a-z0-9 ]/g," ").trim().replace(/\s+/g," ");
    if (!k) continue;
    (groups[k] = groups[k] || []).push(tx);
  }
  const subs = [];
  for (const [key, txs] of Object.entries(groups)) {
    if (txs.length < 2) continue;
    const sorted = txs.slice().sort((a,b)=> a.date.localeCompare(b.date));
    const gaps = [];
    for (let i=1; i<sorted.length; i++) {
      const g = (new Date(sorted[i].date) - new Date(sorted[i-1].date)) / 86400000;
      gaps.push(g);
    }
    const avgGap = gaps.reduce((a,b)=>a+b,0) / gaps.length;
    let freq = null;
    if (avgGap >= 6  && avgGap <= 8)   freq = "weekly";
    else if (avgGap >= 13 && avgGap <= 16)  freq = "biweekly";
    else if (avgGap >= 25 && avgGap <= 35)  freq = "monthly";
    else if (avgGap >= 85 && avgGap <= 95)  freq = "quarterly";
    else if (avgGap >= 350 && avgGap <= 380) freq = "yearly";
    else continue;

    const amounts = sorted.map(t => +t.amount);
    const avg = amounts.reduce((a,b)=>a+b,0) / amounts.length;
    const maxDev = Math.max(...amounts.map(a => Math.abs(a - avg) / (avg||1)));
    if (maxDev > 0.20) continue;

    const last = sorted[sorted.length - 1];
    const next = new Date(last.date); next.setDate(next.getDate() + Math.round(avgGap));
    const monthly = freq === "monthly" ? avg
                  : freq === "yearly" ? avg/12
                  : freq === "weekly" ? avg*4.3
                  : freq === "biweekly" ? avg*2.17
                  : freq === "quarterly" ? avg/3
                  : 0;
    const status = (DB.subscriptionsMeta || {})[key]?.status || "active";
    subs.push({
      key,
      merchant: last.note || last.category || key,
      frequency: freq,
      avg_amount: avg,
      last_charge_date: last.date,
      next_predicted: todayKey(next),
      occurrences: sorted.length,
      first_seen: sorted[0].date,
      monthly_cost: monthly,
      status,
    });
  }
  return subs.sort((a,b) => b.monthly_cost - a.monthly_cost);
}
function setSubscriptionStatus(key, status) {

  DB.subscriptionsMeta[key] = { status };

function snapshotNetWorth() {
  // Snapshot if there's anything to track (plaid accounts OR manual assets/liabilities)
  const hasPlaid = (DB.accounts || []).length > 0;
  const hasManual = (DB.assets || []).length > 0 || (DB.liabilities || []).length > 0;
  if (!hasPlaid && !hasManual) return;
  const byType = { depository: 0, investment: 0, credit: 0, loan: 0, other: 0 };
  for (const a of (DB.accounts || [])) {
    const bal = +a.balance_current || 0;
    const t = ["depository","investment","credit","loan"].includes(a.type) ? a.type : "other";
    byType[t] += bal;
  }
  const manualAssetTotal = (DB.assets || []).reduce((s,a)=>s+(+a.value||0), 0);
  const manualLiabTotal  = (DB.liabilities || []).reduce((s,l)=>s+(+l.balance||0), 0);
  const total = byType.depository + byType.investment + byType.other - byType.credit - byType.loan + manualAssetTotal - manualLiabTotal;
  if (!DB.netWorthHistory) DB.netWorthHistory = [];
  const today = todayKey();
  const idx = DB.netWorthHistory.findIndex(s => s.date === today);
  const snap = { date: today, total, by_type: byType };
  if (idx >= 0) DB.netWorthHistory[idx] = snap;
  else DB.netWorthHistory.push(snap);
  // cap ~2 years
  if (DB.netWorthHistory.length > 730) DB.netWorthHistory = DB.netWorthHistory.slice(-730);
  // Check for newly-crossed milestones — fires a celebration toast + confetti.
  // Guarded with try/catch since this is a side effect; never let a milestone
  // bug block a snapshot from saving.
  try { checkNetWorthMilestones(); } catch {}
}

function netWorthSparkline(history, w=300, h=60) {
  if (!history.length) return "";
  const vals = history.map(s => s.total);
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const stepX = vals.length > 1 ? w / (vals.length - 1) : 0;
  const pts = vals.map((v,i) => `${(i*stepX).toFixed(1)},${(h - ((v - min) / range) * h).toFixed(1)}`).join(" ");
  const last = vals[vals.length-1];
  const lastX = (vals.length-1) * stepX;
  const lastY = h - ((last - min) / range) * h;
  const trendUp = vals.length >= 2 && vals[vals.length-1] >= vals[0];
  const color = trendUp ? "#34C759" : "#FF3B30";
  return `
    <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%;height:${h}px;display:block">
      <defs>
        <linearGradient id="nw-fill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${color}" stop-opacity="0.25"/>
          <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <polygon fill="url(#nw-fill)" points="0,${h} ${pts} ${w},${h}"/>
      <polyline fill="none" stroke="${color}" stroke-width="2" points="${pts}"/>
      <circle cx="${lastX.toFixed(1)}" cy="${lastY.toFixed(1)}" r="3" fill="${color}"/>
    </svg>
  `;
}

/* Lock screen with brute-force backoff.
   Failed-attempt state is stored in plain localStorage (separate key from the
   encrypted envelope). After 4 wrong attempts, attempts are gated by an
   exponentially increasing wait window. The lockout is best-effort — anyone
   who can clear localStorage can reset it — but it deters casual attackers
   on a stolen unlocked phone, which is the realistic threat. */
const LOCK_STATE_KEY = "ascend_lock_state";
function _readLockState() {
  try { return JSON.parse(localStorage.getItem(LOCK_STATE_KEY) || "{}"); } catch { return {}; }
}
function _writeLockState(s) {
  try { localStorage.setItem(LOCK_STATE_KEY, JSON.stringify(s)); } catch {}
}
function _lockoutSeconds(fails) {
  if (fails < 4)  return 0;
  if (fails < 8)  return 30;
  if (fails < 12) return 120;
  if (fails < 20) return 600;
  return 3600;
}

function showLockScreen() {
  // Replace whole UI temporarily with a passphrase prompt
  document.body.innerHTML = `
    <div style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);padding:32px;text-align:center">
      <div style="font-size:44px;margin-bottom:14px">🔒</div>
      <div style="font-size:24px;font-weight:700;margin-bottom:6px">Ascend is locked</div>
      <div style="color:var(--t3);margin-bottom:24px;font-size:14px">Enter your passphrase to unlock</div>
      <input id="lock-pp" type="password" autofocus placeholder="Passphrase" autocomplete="current-password" style="background:var(--bg-elev);padding:14px;border-radius:12px;font-size:16px;width:100%;max-width:300px;text-align:center" />
      <button id="lock-go" style="margin-top:14px;padding:14px 24px;background:var(--blue);color:#fff;border-radius:12px;font-weight:600;font-size:16px;width:100%;max-width:300px;border:none">Unlock</button>
      <div id="lock-err" style="color:var(--red);margin-top:14px;font-size:13px;height:16px"></div>
      <div id="lock-cool" style="color:var(--t3);margin-top:6px;font-size:12px;height:16px"></div>
      <div style="margin-top:24px;font-size:12px;color:var(--t4);max-width:300px;line-height:1.5">Forgot your passphrase? There's no recovery — your data is unrecoverable. <a href="#" id="lock-reset" style="color:var(--red)">Reset and start over</a></div>
    </div>
  `;

  const errEl  = () => document.getElementById("lock-err");
  const coolEl = () => document.getElementById("lock-cool");
  const ppEl   = () => document.getElementById("lock-pp");
  const btnEl  = () => document.getElementById("lock-go");

  let cooldownTimer = null;
  function refreshCooldown() {
    const s = _readLockState();
    const remaining = Math.max(0, Math.ceil(((s.until || 0) - Date.now()) / 1000));
    if (remaining > 0) {
      btnEl().disabled = true;
      btnEl().style.opacity = "0.5";
      ppEl().disabled = true;
      const m = Math.floor(remaining / 60), sec = remaining % 60;
      coolEl().textContent = "Too many tries — wait " + (m > 0 ? `${m}m ${sec}s` : `${sec}s`);
      cooldownTimer = setTimeout(refreshCooldown, 1000);
    } else {
      btnEl().disabled = false;
      btnEl().style.opacity = "1";
      ppEl().disabled = false;
      coolEl().textContent = "";
      if (cooldownTimer) { clearTimeout(cooldownTimer); cooldownTimer = null; }
    }
  }

  const tryUnlock = async () => {
    const state = _readLockState();
    if (state.until && state.until > Date.now()) { refreshCooldown(); return; }
    const pp = ppEl().value;
    if (!pp) return;
    try {
      await unlockWithPassphrase(pp);
      _writeLockState({}); // clear on success
      location.reload();
    } catch (e) {
      const next = Object.assign({}, state);
      next.fails = (next.fails || 0) + 1;
      const wait = _lockoutSeconds(next.fails);
      next.until = wait > 0 ? Date.now() + wait * 1000 : 0;
      _writeLockState(next);
      errEl().textContent = "Incorrect passphrase" + (next.fails > 3 ? ` (${next.fails} tries)` : "");
      ppEl().value = "";
      if (wait > 0) refreshCooldown();
    }
  };

  btnEl().addEventListener("click", tryUnlock);
  ppEl().addEventListener("keydown", e => { if (e.key === "Enter") tryUnlock(); });
  document.getElementById("lock-reset").addEventListener("click", (e) => {
    e.preventDefault();
    // Two-step confirmation: a simple confirm() is too easy to fat-finger for
    // an irreversible localStorage.clear(). Require the user to type DELETE.
    const typed = prompt("This will permanently erase ALL your encrypted data. There is no recovery.\n\nType DELETE to confirm:");
    if (typed === "DELETE") {
      localStorage.clear();
      location.reload();
    } else if (typed != null) {
      alert("Cancelled — your data is unchanged. (You must type DELETE exactly.)");
    }
  });

  refreshCooldown();
}

/* ================================================================
   ASCEND v3 ADDITIONS — appended below the existing v2 codebase.
   Everything in this block is additive. New persisted fields all
   live on the v2 DB shape and are seeded by DEFAULT_DB so existing
   users get safe defaults on next save().
================================================================ */

/* Safe-to-spend
   What the owner can spend today without breaking budget.
   Formula:
     monthly inflow   = budget.income + sum(recurring income / monthly equivalent)
     fixed outflow    = sum(recurring expenses / monthly equivalent)
                      + budget.expenses (fixed monthly category caps)
     savings target   = settings.monthlySavingsTarget (0 if unset)
     month-to-date    = sum of this month's spend so far
     daysLeft         = days remaining in current month (incl today)
     safeToday        = max(0, (inflow - fixed - savings - mtd) / daysLeft)
*/
const RECURRING_PER_MONTH = { weekly: 4.345, biweekly: 2.1725, monthly: 1, yearly: 1/12 };
function recurringMonthlyTotal(kind) {
  const list = (DB.recurring || []).filter(r => r.kind === kind);
  return list.reduce((a, r) => a + (+r.amount || 0) * (RECURRING_PER_MONTH[r.cadence] || 1), 0);
}
function safeToSpend() {
  const income = (+(DB.budget && DB.budget.income) || 0) + recurringMonthlyTotal("income");
  const fixedRecurring = recurringMonthlyTotal("expense");
  const fixedBudget = ((DB.budget && DB.budget.expenses) || []).reduce((a, e) => a + (+e.amount || 0), 0);
  const savingsTarget = +(DB.settings && DB.settings.monthlySavingsTarget) || 0;
  const mtd = monthSpend();
  const now = new Date();
  const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
  const daysLeft = Math.max(1, daysInMonth - now.getDate() + 1);
  const remainingBudget = income - fixedRecurring - fixedBudget - savingsTarget - mtd;
  const perDay = remainingBudget / daysLeft;
  return {
    perDay: Math.max(0, perDay),
    remaining: Math.max(0, remainingBudget),
    income, fixedRecurring, fixedBudget, savingsTarget, mtd, daysLeft, daysInMonth,
    onTrack: remainingBudget >= 0,
  };
}

/* Privacy mode
   Toggling sets a class on body that blurs anything tagged with
   data-priv="amount" via CSS.
*/
function applyPrivacyMode() {
  document.body.classList.toggle("priv-on", !!(DB.settings && DB.settings.privacyMode));
}
function togglePrivacyMode() {
  DB.settings.privacyMode = !DB.settings.privacyMode;
  save(); applyPrivacyMode();
  toast(DB.settings.privacyMode ? "Privacy mode on" : "Privacy mode off");
}

/* Auto-lock — clears APP_KEY after N min hidden when encrypted */
let _hiddenAt = 0;
function autoLockSetup() {
  document.addEventListener("visibilitychange", () => {
    const m = +(DB.settings && DB.settings.autoLockMinutes) || 0;
    if (!(DB.settings && DB.settings.encrypted) || m <= 0) return;
    if (document.hidden) {
      _hiddenAt = Date.now();
    } else if (_hiddenAt) {
      const elapsedMin = (Date.now() - _hiddenAt) / 60000;
      _hiddenAt = 0;
      if (elapsedMin >= m && APP_KEY) {
        APP_KEY = null;
        toast("Locked - re-enter passphrase");
        setTimeout(() => location.reload(), 600);
      }
    }
  });
}

/* ================ SMART MONEY PLAYS ================
   Rule-based "what should I do next?" recommendations. Each rule reads
   DB + optional DB.profile and returns a play card or null. Plays are
   EDUCATION, not advice — they suggest frameworks, not specific securities.

   Adding a new play: write a function that returns { id, priority, emoji,
   title, body, why, actionLabel, actionFn } or null, then push it into the
   `rules` array in computeSmartPlays(). Higher priority = surfaced earlier.
*/

// IRS contribution limits — bump annually
const IRA_LIMIT_BY_YEAR = { 2025: 7000, 2026: 7000, 2027: 7500 };
const IRA_CATCHUP_DELTA = 1000; // age 50+ adds this much
function _iraLimit(year, age) {
  const base = IRA_LIMIT_BY_YEAR[year] || IRA_LIMIT_BY_YEAR[2026];
  return base + (age >= 50 ? IRA_CATCHUP_DELTA : 0);
}

function _playsAge() { return +DB.profile?.age || 30; }
function _playsMonthlyIncome() {
  // Use budget income if set; otherwise fall back to detected recurring income.
  return (+(DB.budget?.income) || 0) + recurringMonthlyTotal("income");
}
function _playsMonthlyFixed() {
  // Don't double-count recurring with budget.expenses — they often overlap.
  // Use the larger of the two as the conservative estimate.
  const rec = recurringMonthlyTotal("expense");
  const bud = (DB.budget?.expenses || []).reduce((s,e) => s + (+e.amount || 0), 0);
  return Math.max(rec, bud);
}
function _playsTotalSavings() {
  return (DB.savings || []).reduce((s,x) => s + (+x.current || 0), 0);
}
function _playsHighestAprDebt() {
  const items = (DB.liabilities || []).filter(l => +l.apr > 0);
  if (!items.length) return null;
  return items.slice().sort((a,b) => +b.apr - +a.apr)[0];
}
function _playsNwSnapshotAgeDays() {
  const hist = DB.netWorthHistory || [];
  if (!hist.length) return null;
  const last = hist[hist.length - 1];
  return Math.floor((Date.now() - new Date(last.date + "T00:00:00").getTime()) / 86400000);
}

function computeSmartPlays() {
  const out = [];
  const dismissed = DB.dismissedPlays || {};
  const income = _playsMonthlyIncome();
  const fixed = _playsMonthlyFixed();
  const savings = _playsTotalSavings();
  const monthsRunway = fixed > 0 ? savings / fixed : 0;
  const debt = _playsHighestAprDebt();
  const nwAge = _playsNwSnapshotAgeDays();
  const age = _playsAge();
  const profile = DB.profile || {};
  const year = new Date().getFullYear();

  // P1 — Pay off high-APR debt (highest priority — beats almost any investment)
  if (debt && +debt.apr >= 7) {
    out.push({
      id: "high-apr-debt",
      priority: 95,
      emoji: "🔥",
      title: `Prioritize ${debt.name}`,
      body: `${(+debt.apr).toFixed(1)}% APR on ${fmt$0(debt.balance)}. Paying this off is a guaranteed return — beats any reasonable market expectation.`,
      why: "Debt with APR above ~7% mathematically dominates investing: it's a guaranteed return at that rate. Stocks average 7-10% historically but with risk. Crush the high-APR debt first, then invest.",
      actionLabel: "Open debts",
      actionFn: "showTab('money')",
    });
  }

  // P2 — 401k match if employer offers it
  if (profile.employerMatch && income > 0) {
    out.push({
      id: "401k-match",
      priority: 92,
      emoji: "🎁",
      title: "Contribute to your 401k match",
      body: "Your employer offers a match. This is the closest thing to free money in personal finance.",
      why: "A 401k match is an instant 50-100% return on the matched portion. No investment beats that. Contribute at least enough to get the full match — anything less is leaving compensation on the table.",
      actionLabel: "Got it (dismiss)",
      actionFn: "dismissPlay('401k-match')",
    });
  }

  // P3 — Build emergency fund to 3 months
  if (fixed > 0 && monthsRunway < 3) {
    const target3mo = fixed * 3;
    const gap = Math.max(0, target3mo - savings);
    const months = 6;
    const need = Math.max(10, Math.round((gap / months) / 10) * 10);
    out.push({
      id: "emergency-fund-3mo",
      priority: 88,
      emoji: "🛡️",
      title: "Build a 3-month emergency fund",
      body: `You have ${fmt$0(savings)} saved — about ${monthsRunway.toFixed(1)} months of expenses. Target: ${fmt$0(target3mo)} (3 months). Saving ${fmt$0(need)}/mo gets you there in ${months} months.`,
      why: "Before investing aggressively, anchor on 3-6 months of expenses in cash. A layoff or medical event without this fund forces you to sell investments at a loss or take on high-interest debt — both of which set you back years.",
      actionLabel: "Set up savings goal",
      actionFn: "addSavingSheet()",
    });
  }

  // P4 — Max Roth IRA before year-end
  if (income > 0 && age < 70) {
    const limit = _iraLimit(year, age);
    const today = new Date();
    const yearEnd = new Date(today.getFullYear(), 11, 31);
    const monthsLeft = Math.max(1, Math.ceil((yearEnd - today) / (30.4 * 86400000)));
    const monthlyToMax = Math.ceil(limit / monthsLeft / 10) * 10;
    out.push({
      id: "max-roth-ira-" + year,
      priority: 78,
      emoji: "🎯",
      title: `Max your Roth IRA for ${year}`,
      body: `${year} limit: ${fmt$0(limit)}${age >= 50 ? " (includes age-50 catchup)" : ""}. ${monthsLeft} months left → ${fmt$0(monthlyToMax)}/mo to hit it.`,
      why: "A Roth IRA is post-tax money in, tax-free growth, tax-free withdrawals. Contributions (not earnings) can be withdrawn anytime without penalty, so it doubles as a backup emergency fund. Use it before any taxable brokerage.",
      actionLabel: "Add as savings goal",
      actionFn: "addSavingSheet()",
    });
  }

  // P5 — HSA if eligible (triple tax advantage)
  if (profile.hsaEligible && income > 0) {
    out.push({
      id: "hsa-contribution",
      priority: 75,
      emoji: "🏥",
      title: "Max your HSA contribution",
      body: "You're on a high-deductible health plan, which means HSA eligibility. HSAs have a triple tax advantage — the best account in the entire tax code.",
      why: "Pre-tax in, tax-free growth, tax-free out (for medical). After 65, withdrawals for any purpose are taxed like a traditional 401k — making it effectively a stealth retirement account on top of medical coverage.",
      actionLabel: "Got it (dismiss)",
      actionFn: "dismissPlay('hsa-contribution')",
    });
  }

  // P6 — Auto-allocate paychecks
  if (income > 0 && !(DB.allocations || []).length && (DB.savings || []).length) {
    out.push({
      id: "setup-allocations",
      priority: 60,
      emoji: "💸",
      title: "Auto-allocate your paycheck",
      body: "Set rules to split each paycheck into savings goals automatically. 'Pay yourself first' is the single highest-leverage money habit.",
      why: "Manual saving fails because it relies on willpower at month-end. Automation moves saving to the front — you save first, spend the rest, never miss it. People who automate save 2-3× more over a decade.",
      actionLabel: "Set up allocations",
      actionFn: "showTab('settings')",
    });
  }

  // P7 — Add first savings goal
  if (!(DB.savings || []).length) {
    out.push({
      id: "first-savings-goal",
      priority: 70,
      emoji: "🌱",
      title: "Add your first savings goal",
      body: "Specific goals beat 'just save more' 2× in research. Name a number and a date.",
      why: "Goal-setting research is unambiguous: specificity beats intensity. 'Save $1,000 emergency fund by August' moves the needle. 'Save more' doesn't.",
      actionLabel: "Add a savings goal",
      actionFn: "addSavingSheet()",
    });
  }

  // P8 — Recurring bill audit
  const recExp = recurringMonthlyTotal("expense");
  if (income > 0 && recExp > 0 && recExp / income > 0.5) {
    out.push({
      id: "review-recurring-" + new Date().toISOString().slice(0,7),
      priority: 50,
      emoji: "🔄",
      title: "Audit your recurring bills",
      body: `${fmt$0(recExp)}/mo in recurring expenses — ${Math.round(recExp/income*100)}% of income. High fixed costs reduce flexibility.`,
      why: "Recurring charges bypass willpower because you never re-decide. An annual audit typically cuts 15-30% of monthly recurring spend just by canceling things you stopped using.",
      actionLabel: "Review recurring",
      actionFn: "showTab('settings')",
    });
  }

  // P9 — Add recurring bills if none entered
  if (income > 0 && !(DB.recurring || []).length) {
    out.push({
      id: "add-recurring-bills",
      priority: 45,
      emoji: "📅",
      title: "Add your recurring bills",
      body: "Rent, gym, subscriptions, insurance. Used for Safe-to-spend and to surface upcoming bills.",
      why: "Without recurring bills entered, the app can't tell you what's safe to spend or what's coming up. 5 minutes of setup, then it runs on autopilot.",
      actionLabel: "Add a recurring bill",
      actionFn: "addRecurringSheet()",
    });
  }

  // P10 — Track net worth (small but compounds)
  if (nwAge === null || nwAge > 7) {
    out.push({
      id: "snapshot-net-worth",
      priority: 30,
      emoji: "📈",
      title: nwAge === null ? "Take your first net-worth snapshot" : "Snapshot net worth this week",
      body: nwAge === null
        ? "One tap creates the first point on your wealth chart."
        : `Last snapshot was ${nwAge} days ago. Weekly is the sweet spot.`,
      why: "What gets measured gets managed. A weekly net-worth point reveals whether your strategy is working faster than any spending analysis can. Hours of dashboards can't replace one data point a week.",
      actionLabel: "Snapshot now",
      actionFn: "snapshotNetWorth(); render(); toast('Snapshot saved')",
    });
  }

  // P11 — Set basic profile so plays sharpen
  if (!profile.age) {
    out.push({
      id: "fill-profile",
      priority: 25,
      emoji: "👤",
      title: "Tell us about yourself",
      body: "Age, 401k match, HSA eligibility — these inputs make Smart Plays a lot sharper.",
      why: "Without basic profile info, the engine has to use neutral defaults. A 30-second profile unlocks age-aware contribution catchups, tax-bracket hints, and account-priority adjustments.",
      actionLabel: "Fill in profile",
      actionFn: "profileSheet()",
    });
  }

  return out
    .filter(p => !dismissed[p.id])
    .sort((a,b) => b.priority - a.priority);
}

function dismissPlay(id) {
  DB.dismissedPlays = DB.dismissedPlays || {};
  DB.dismissedPlays[id] = true;
  save();
  // If called from inside a sheet, the sheet caller is responsible for refreshing.
  // Otherwise, re-render Today so the dismissed play disappears immediately.
  render();
}

function resetDismissedPlays() {
  DB.dismissedPlays = {};
  save(); render();
  toast("Smart Plays reset");
}

  `;

  openSheet(`

    <div class="actions" style="margin-top:14px">

}

/* ================ RETIREMENT PROJECTION ================
   Compound-interest projection of invested balance + monthly contributions
   growing at a real (post-inflation) annual return, to a target age, then a
   safe-withdrawal estimate at retirement. Educational, not advice.

   Math: balance_{m+1} = balance_m * (1 + r/12) + monthly_contribution
   (contributions assumed at end of month).
*/

// Sum of investment-type assets across Plaid + manual.
function currentInvested() {
  let total = 0;
  for (const a of (DB.accounts || [])) {
    if (a.type === "investment" || a.type === "brokerage") total += +a.balance_current || 0;
  }
  for (const a of (DB.assets || [])) {
    if (a.type === "investment" || a.type === "crypto") total += +a.value || 0;
  }
  return total;
}

function projectRetirement({ currentAge, targetAge, currentBalance, monthlyContribution, annualReturn }) {
  const monthlyR = (annualReturn / 100) / 12;
  const points = [];
  let balance = currentBalance;
  // Cap projection at 50 years so a misclick (e.g. currentAge=20, target=200) doesn't loop forever.
  const span = Math.min(50, Math.max(0, targetAge - currentAge));
  for (let i = 0; i <= span; i++) {
    points.push({ age: currentAge + i, balance: Math.round(balance) });
    for (let m = 0; m < 12; m++) {
      balance = balance * (1 + monthlyR) + monthlyContribution;
    }
  }
  return points;
}

// SVG line/area chart for the projection. Same visual style as netWorthSparkline
// but uses absolute 0 as the y-axis floor (so growth feels "right").
function retirementChart(points, w=300, h=120) {
  if (!points.length) return "";
  const vals = points.map(p => p.balance);
  const max = Math.max(1, ...vals);
  const stepX = points.length > 1 ? w / (points.length - 1) : 0;
  const pts = vals.map((v,i) => `${(i*stepX).toFixed(1)},${(h - (v / max) * h).toFixed(1)}`).join(" ");
  return `
    <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%;height:${h}px;display:block;margin-top:10px">
      <defs>
        <linearGradient id="ret-fill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#34C759" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="#34C759" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <polygon fill="url(#ret-fill)" points="0,${h} ${pts} ${w},${h}"/>
      <polyline fill="none" stroke="#34C759" stroke-width="2" points="${pts}"/>
    </svg>
  `;
}

function retirementSheet() {
  const profile = DB.profile || {};
  const retire = DB.retirement || {};
  const currentAge = +profile.age || 30;
  const invested = currentInvested();
  let target = +retire.targetAge || 65;
  if (target <= currentAge) target = currentAge + 1;
  const initialMonthly = +retire.monthlyContribution || +DB.settings.monthlySavingsTarget || 500;
  const initialReturn = +retire.annualReturn || 7;
  const initialWithdrawal = +retire.withdrawalRate || 4;

  const renderProjection = (t, m, r, w) => {
    const safeT = Math.max(currentAge + 1, Math.min(100, +t || 65));
    const points = projectRetirement({
      currentAge, targetAge: safeT,
      currentBalance: invested,
      monthlyContribution: Math.max(0, +m || 0),
      annualReturn: Math.max(0, +r || 0),
    });
    const final = points[points.length-1].balance;
    const annualWd = final * ((+w || 4) / 100);
    return `
      <div style="background:var(--card);border-radius:var(--r);padding:16px;border:1px solid var(--sep)">
        <div style="font-size:12px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.4px">Projected at age ${safeT}</div>
        <div style="font-size:30px;font-weight:700;letter-spacing:-.5px;margin:6px 0" data-priv="amount">${fmt$0(final)}</div>
        <div style="font-size:13px;color:var(--t2)" data-priv="amount">${fmt$0(annualWd / 12)}/mo safe withdrawal · ${fmt$0(annualWd)}/yr</div>
        ${retirementChart(points, 300, 110)}
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--t3);margin-top:6px">
          <span>Age ${currentAge}</span><span>Age ${safeT}</span>
        </div>
      </div>
    `;
  };

  openSheet(`
    <h2>🏖️ Retirement projection</h2>
    <p class="muted" style="font-size:12px;margin-bottom:14px">Compound-interest math on your invested balance. Educational — real returns vary. Adjust the assumptions to see how the picture changes.</p>
    <div id="ret-output">${renderProjection(target, initialMonthly, initialReturn, initialWithdrawal)}</div>
    <div style="background:var(--bg-elev);border-radius:var(--r);padding:14px;margin-top:12px">
      <div style="font-size:12px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px">Assumptions</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:13px">
        <span>Current age</span>
        <span style="font-weight:600">${currentAge}${profile.age ? "" : ' <span class="muted" style="font-weight:400;font-size:11px">(default — set in profile)</span>'}</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:13px">
        <span>Current invested</span>
        <span style="font-weight:600" data-priv="amount">${fmt$0(invested)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:13px">
        <label for="ret-target">Target age</label>
        <input id="ret-target" type="number" min="${currentAge+1}" max="100" value="${target}" style="background:var(--card);padding:6px 10px;border-radius:6px;width:80px;text-align:right" />
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:13px">
        <label for="ret-monthly">Monthly contribution ($)</label>
        <input id="ret-monthly" type="number" min="0" step="50" value="${initialMonthly}" style="background:var(--card);padding:6px 10px;border-radius:6px;width:90px;text-align:right" />
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:13px">
        <label for="ret-return">Annual return (%)</label>
        <input id="ret-return" type="number" min="0" max="20" step="0.5" value="${initialReturn}" style="background:var(--card);padding:6px 10px;border-radius:6px;width:80px;text-align:right" />
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;font-size:13px">
        <label for="ret-withdrawal">Safe withdrawal (%)</label>
        <input id="ret-withdrawal" type="number" min="2" max="8" step="0.25" value="${initialWithdrawal}" style="background:var(--card);padding:6px 10px;border-radius:6px;width:80px;text-align:right" />
      </div>
      <p class="muted" style="font-size:11px;margin-top:10px;line-height:1.5">7% is the long-term real (post-inflation) return for a diversified US stock portfolio. The 4% rule comes from the Trinity Study — withdrawing 4% annually has historically lasted 30+ years.</p>
    </div>
    <div class="actions">
      <button class="btn secondary" onclick="closeSheet()">Close</button>
      <button class="btn" id="ret-save">Save assumptions</button>
    </div>
  `);

  // Live refresh on any input change
  const refresh = () => {
    $("#ret-output").innerHTML = renderProjection(
      $("#ret-target").value,
      $("#ret-monthly").value,
      $("#ret-return").value,
      $("#ret-withdrawal").value,
    );
  };
  ["#ret-target","#ret-monthly","#ret-return","#ret-withdrawal"].forEach(sel => {
    $(sel).addEventListener("input", refresh);
  });

  $("#ret-save").addEventListener("click", async () => {
    DB.retirement = {
      targetAge: Math.max(currentAge+1, Math.min(100, +$("#ret-target").value || 65)),
      monthlyContribution: Math.max(0, +$("#ret-monthly").value || 0),
      annualReturn: Math.max(0, Math.min(20, +$("#ret-return").value || 7)),
      withdrawalRate: Math.max(2, Math.min(8, +$("#ret-withdrawal").value || 4)),
    };
    await save(); closeSheet(); render(); toast("Saved");
  });
}

/* ================ WEALTH HEALTH SCORE ================
   A 0-100 composite score reflecting financial health across 5 dimensions:
     Runway (25)   — months of fixed expenses covered by savings
     Debt   (20)   — penalty for high-interest debt
     Savings (20)  — what % of income is being saved
     Trend  (15)   — net-worth growth direction over recent history
     Investing (20)— what % of wealth is invested

   The score is intentionally generous toward starting users (we want
   the green-light moments to come early) but each dimension has clear
   thresholds the user can pursue.
*/

function _scoreClamp(x, max) { return Math.max(0, Math.min(max, x)); }

function computeWealthHealth() {
  const monthlyFixed = _playsMonthlyFixed();
  const totalSavings = _playsTotalSavings();
  const income = _playsMonthlyIncome();
  const comp = wealthComposition();
  const hist = DB.netWorthHistory || [];

  // --- Runway (0-25) ---
  // 6+ months of expenses = full marks. 0 = 0. Linear interpolation.
  const months = monthlyFixed > 0 ? totalSavings / monthlyFixed : (totalSavings > 0 ? 6 : 0);
  const runwayScore = Math.round(_scoreClamp((months / 6) * 25, 25));

  // --- Debt (0-20) ---
  // No debt = 20. Each $1 of debt above $1k of income reduces by a small amount.
  // High-APR debt (>7%) caps the score at 5.
  let debtScore = 20;
  const highApr = _playsHighestAprDebt();
  if (highApr && +highApr.apr >= 7) {
    debtScore = 5;
  } else if (comp.debts > 0 && income > 0) {
    // Debt-to-income ratio penalty (annual income).
    const dti = comp.debts / (income * 12);
    debtScore = Math.round(_scoreClamp(20 * (1 - dti), 20));
  } else if (comp.debts > 0 && income === 0) {
    debtScore = 10; // can't compute DTI without income
  }

  // --- Savings rate (0-20) ---
  // (income - fixed) / income — what fraction of pay survives fixed bills.
  // 50%+ = full marks. <0% = 0.
  let savingsScore = 0;
  if (income > 0) {
    const surplus = (income - monthlyFixed) / income;
    savingsScore = Math.round(_scoreClamp((surplus / 0.5) * 20, 20));
  }

  // --- Trend (0-15) ---
  // Compare current net worth to 90 days ago. Up = full marks.
  // Flat = half. Down = 0.
  let trendScore = 8; // neutral default when no history
  if (hist.length >= 2) {
    const cur = hist[hist.length - 1].total;
    // Find a point ~90 days ago, or the oldest available if shorter
    const cutoff = Date.now() - 90 * 86400000;
    let baseIdx = 0;
    for (let i = hist.length - 1; i >= 0; i--) {
      if (new Date(hist[i].date + "T00:00:00").getTime() <= cutoff) { baseIdx = i; break; }
    }
    const base = hist[baseIdx].total || 1;
    const growthRate = (cur - base) / Math.abs(base);
    // 10%+ growth in 90d = max marks. 0% = half. -10%+ = 0.
    trendScore = Math.round(_scoreClamp(15 * (0.5 + growthRate * 5), 15));
  }

  // --- Investing (0-20) ---
  // Investments / (cash + investments + real). 30%+ = full marks for the
  // average user (excludes home equity which often dominates real assets).
  const investableTotal = comp.cash + comp.investments;
  let investScore = 0;
  if (investableTotal > 0) {
    const invRatio = comp.investments / investableTotal;
    investScore = Math.round(_scoreClamp((invRatio / 0.3) * 20, 20));
  }

  const total = runwayScore + debtScore + savingsScore + trendScore + investScore;

  // Top suggestion = the dimension with the largest unclaimed score
  const dims = [
    { name: "Runway", score: runwayScore, max: 25, suggest: months < 3 ? `Build emergency fund to 3+ months of expenses (currently ${months.toFixed(1)})` : months < 6 ? `Stretch emergency fund to 6 months (${months.toFixed(1)} now)` : null },
    { name: "Debt", score: debtScore, max: 20, suggest: highApr && +highApr.apr >= 7 ? `Pay off ${highApr.name} (${(+highApr.apr).toFixed(1)}% APR)` : (comp.debts > 0 ? "Reduce overall debt load" : null) },
    { name: "Savings rate", score: savingsScore, max: 20, suggest: income > 0 && savingsScore < 16 ? "Cut recurring expenses or grow income — target 50% surplus" : null },
    { name: "Trend", score: trendScore, max: 15, suggest: hist.length < 2 ? "Snapshot net worth weekly to start tracking trend" : trendScore < 10 ? "Focus on growing net worth — even +1% / month compounds" : null },
    { name: "Investing", score: investScore, max: 20, suggest: investScore < 16 ? (comp.investments === 0 ? "Open a brokerage and start automatic investing" : "Increase investing share of your wealth") : null },
  ];
  const topGap = dims
    .filter(d => d.suggest)
    .sort((a, b) => (b.max - b.score) - (a.max - a.score))[0];

  return { total, dims, topGap, monthsRunway: months };
}

function wealthHealthLabel(score) {
  if (score >= 80) return { word: "Excellent", color: "#34C759" };
  if (score >= 65) return { word: "Strong",    color: "#34C759" };
  if (score >= 50) return { word: "On track",  color: "#FFCC00" };
  if (score >= 30) return { word: "Building",  color: "#FF9500" };
  return                  { word: "Just starting", color: "#FF3B30" };
}

function wealthHealthSheet() {
  const r = computeWealthHealth();
  const lbl = wealthHealthLabel(r.total);
  const bar = (d) => {
    const pct = (d.score / d.max) * 100;
    return `
      <div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
          <span>${d.name}</span>

        </div>
        <div style="height:8px;background:var(--bg-elev);border-radius:4px;overflow:hidden">
          <div style="height:100%;background:${lbl.color};width:${pct}%;transition:width .3s"></div>
        </div>
        ${d.suggest ? `<div style="font-size:11px;color:var(--t3);margin-top:4px">→ ${esc(d.suggest)}</div>` : ""}
      </div>
    `;
  };
  openSheet(`
    <h2>🩺 Wealth Health</h2>
    <p class="muted" style="font-size:12px;margin-bottom:14px">A composite 0-100 score across 5 dimensions of financial health. Educational, not advice.</p>
    <div style="background:var(--card);border-radius:var(--r);padding:18px;text-align:center;margin-bottom:14px">
      <div style="font-size:56px;font-weight:700;letter-spacing:-1px;color:${lbl.color};line-height:1">${r.total}</div>
      <div style="font-size:14px;font-weight:600;color:${lbl.color};margin-top:4px">${lbl.word}</div>
      <div style="font-size:12px;color:var(--t3);margin-top:4px">out of 100</div>
    </div>
    <div style="background:var(--card);border-radius:var(--r);padding:14px;margin-bottom:14px">
      <div style="font-size:12px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px">Breakdown</div>
      ${r.dims.map(bar).join("")}
    </div>
    ${r.topGap ? `
      <div style="background:var(--bg-elev);border-radius:var(--r);padding:14px;margin-bottom:14px">
        <div style="font-size:12px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">Biggest opportunity</div>
        <div style="font-size:14px;font-weight:600;margin-bottom:4px">${esc(r.topGap.name)} (${r.topGap.score} / ${r.topGap.max})</div>

        <button class="btn sm" style="margin-top:10px;font-size:12px" onclick="closeSheet();smartPlaysSheet()">See Smart Plays</button>
      </div>
    ` : ""}
    <div class="actions">
      <button class="btn secondary" style="width:100%" onclick="closeSheet()">Close</button>
    </div>
  `);
}

/* ================ RENTAL PROPERTY CALCULATOR ================
   Investment real estate underwriting: cap rate, monthly cash flow, and
   cash-on-cash return. Distinct from the primary-residence affordability
   calc — this evaluates a property as an income-producing asset.

   Standard expense assumptions baked in (industry rule of thumb):
     - Property management: 8% of rent
     - Maintenance + repairs reserve: 5% of rent
     - CapEx reserve (roof, HVAC, etc.): 5% of rent
     - Vacancy: 5% (~3 weeks/year empty)
   User can adjust these. Insurance + taxes from inputs, not %.

   Key metrics:
     - 1% rule: rent should be ≥ 1% of purchase price (rough screen)
     - Cap rate: NOI / purchase price (good rentals: 6-10%)
     - Cash-on-cash: annual cash flow / total cash invested
     - Monthly cash flow: rent - PI - operating exp - taxes - insurance
*/

function computeRental(p) {
  const price = Math.max(0, +p.price || 0);
  const downPct = Math.max(0, Math.min(100, +p.downPct || 25));
  const rate = Math.max(0, +p.rate || 7);
  const term = Math.max(1, +p.term || 30);
  const rent = Math.max(0, +p.rent || 0);
  const closing = Math.max(0, +p.closing || price * 0.03);
  const taxRate = Math.max(0, +p.taxRate || 1.2);
  const insurance = Math.max(0, +p.insurance || 1500);
  const hoa = Math.max(0, +p.hoa || 0);
  // Expense rates (as % of rent)
  const mgmtPct = Math.max(0, +p.mgmtPct || 8);
  const maintPct = Math.max(0, +p.maintPct || 5);
  const capexPct = Math.max(0, +p.capexPct || 5);
  const vacancyPct = Math.max(0, +p.vacancyPct || 5);

  const downPayment = price * (downPct / 100);
  const loan = price - downPayment;
  const monthlyPmt = monthlyPI(loan, rate, term);
  const monthlyTax = (price * (taxRate / 100)) / 12;
  const monthlyIns = insurance / 12;
  const monthlyMgmt = rent * (mgmtPct / 100);
  const monthlyMaint = rent * (maintPct / 100);
  const monthlyCapex = rent * (capexPct / 100);
  const effectiveRent = rent * (1 - vacancyPct / 100);
  const monthlyOpEx = monthlyTax + monthlyIns + hoa + monthlyMgmt + monthlyMaint + monthlyCapex;
  const monthlyCashFlow = effectiveRent - monthlyPmt - monthlyOpEx;
  const annualCashFlow = monthlyCashFlow * 12;
  // NOI excludes financing — pure operating return
  const annualNOI = (effectiveRent - (monthlyTax + monthlyIns + hoa + monthlyMgmt + monthlyMaint + monthlyCapex)) * 12;
  const capRate = price > 0 ? (annualNOI / price) * 100 : 0;
  const totalCashIn = downPayment + closing;
  const cocReturn = totalCashIn > 0 ? (annualCashFlow / totalCashIn) * 100 : 0;
  const onePctRule = price > 0 ? (rent / price) * 100 : 0;
  return {
    price, downPayment, loan, closing, totalCashIn,
    monthlyPmt, monthlyTax, monthlyIns, hoa, monthlyMgmt, monthlyMaint, monthlyCapex, monthlyOpEx,
    effectiveRent, monthlyCashFlow, annualCashFlow, annualNOI, capRate, cocReturn, onePctRule,
  };
}

// 2022 SCF data — median and mean US household net worth by age of head.
// Source: Federal Reserve, Bulletin 2023.
const NW_BENCHMARKS = [
  { ageMin: 18, ageMax: 34, label: "Under 35",  median: 39000,  mean: 183500  },
  { ageMin: 35, ageMax: 44, label: "35-44",     median: 135300, mean: 549600  },
  { ageMin: 45, ageMax: 54, label: "45-54",     median: 247700, mean: 975800  },

  { ageMin: 75, ageMax: 120,label: "75+",       median: 335600, mean: 1624100 },
];

function benchmarkForAge(age) {
  const a = +age || 30;
  return NW_BENCHMARKS.find(b => a >= b.ageMin && a <= b.ageMax) || NW_BENCHMARKS[0];

/* ================ INFLATION CALCULATOR ================
   Two views: what an amount today is worth in N years (purchasing power
   erosion), and what an amount N years ago is worth today (price drift).
   Default rate is 3% — close to the long-run US CPI average.

   Educational lens: encourages thinking in real (post-inflation) terms
   rather than nominal dollars. A $100k salary today is not the same as
   $100k in 20 years.
*/

function computeInflation(amount, years, ratePct) {
  const a = Math.max(0, +amount || 0);
  const y = +years || 0;
  const r = Math.max(0, +ratePct || 0) / 100;
  const factor = Math.pow(1 + r, Math.abs(y));
  return {
    todayValue: a,
    futureValue: a * factor,           // a today → a × factor in y years
    pastEquivalent: a / factor,        // a today is worth a/factor y years ago in 'then dollars'
    purchasingPowerLoss: a - (a / factor), // dollars of purchasing power lost over y years
  };
}

/* ================ BIG PURCHASE DECISION TOOL ================
   Frames any major purchase against the alternative of investing the
   same money. Educational, not advice — but the math is sobering and
   useful for impulse buys above a certain threshold.

   Outputs three lenses on a purchase:
     1. True cost per year (price / useful life)
     2. Opportunity cost — what the money becomes invested for the same
        period at the assumed return
     3. 10-year compound impact — what it'd be in a decade
*/

function computePurchaseDecision({ price, usefulLife, returnRate, financedMonths, financedAPR }) {
  const p = Math.max(0, +price || 0);
  const life = Math.max(0.1, +usefulLife || 1);
  const r = Math.max(0, +returnRate || 7) / 100;

  const costPerYear = p / life;
  // Opportunity cost: invest the money for `life` years instead of buying.
  const invForLife = p * Math.pow(1 + r, life);
  const lifeOppCost = invForLife - p;
  // 10-year reference frame
  const inv10 = p * Math.pow(1 + r, 10);

  // If financed, total cost including interest
  let financeTotal = p;
  if (financedMonths && financedAPR != null) {
    const months = Math.max(0, +financedMonths || 0);
    const apr = Math.max(0, +financedAPR || 0) / 100;
    if (months > 0 && apr > 0) {
      const mr = apr / 12;
      const monthlyPmt = p * (mr * Math.pow(1+mr, months)) / (Math.pow(1+mr, months) - 1);
      financeTotal = monthlyPmt * months;
    }
  }
  const financingInterest = Math.max(0, financeTotal - p);

  return { price: p, usefulLife: life, costPerYear, invForLife, lifeOppCost, inv10, financeTotal, financingInterest };
}

  const render = (vals) => {

/* ================ REAL ESTATE CALCULATOR ================
   Home affordability + mortgage payment math. Two views:

   1. Affordability: given income, debt, down payment, rate, term, and
      assumed property tax + insurance + HOA → max home price under the
      28% rule (housing ≤ 28% of gross monthly income).

   2. Payment breakdown: given a specific home price + loan terms,
      shows P&I, property tax, insurance, HOA, total monthly PITI, and
      total interest paid over the life of the loan.

   Educational, not a recommendation. Doesn't model PMI for sub-20% down,
   doesn't include maintenance reserve (general guidance: 1% of price/yr).
*/

// Monthly principal & interest payment for a fixed-rate mortgage
function monthlyPI(loanAmount, annualRatePct, termYears) {
  if (loanAmount <= 0) return 0;
  const r = (annualRatePct / 100) / 12;
  const n = termYears * 12;
  if (r === 0) return loanAmount / n;
  return loanAmount * (r * Math.pow(1+r, n)) / (Math.pow(1+r, n) - 1);
}

function realEstateSheet() {
  const profile = DB.profile || {};
  const monthlyIncome = _playsMonthlyIncome();
  const annualIncome = monthlyIncome * 12;
  // Default state
  let income = annualIncome > 0 ? annualIncome : 75000;
  let downPayment = 50000;
  let rate = 6.75;       // average 30yr fixed (varies)
  let term = 30;
  let propTaxPct = 1.2;  // US average
  let insurance = 1500;  // annual
  let hoa = 0;
  let monthlyDebt = 0;   // other monthly debts (car, student loan minimums)

  const compute = (vals) => {
    const annInc = +vals.income || 0;
    const monthInc = annInc / 12;
    const maxHousing28 = monthInc * 0.28;
    const maxTotal36 = monthInc * 0.36;
    const propTaxMonthly = (annInc > 0 ? 0 : 0); // computed below per price
    const insMonthly = (+vals.insurance || 0) / 12;
    const hoaMonthly = +vals.hoa || 0;
    // The constraint binds whichever is tighter:
    //   28% rule: P&I + taxes + insurance + HOA ≤ 28% of income
    //   36% rule: above + other debts ≤ 36% of income
    const maxPiti28 = maxHousing28;
    const maxPiti36 = maxTotal36 - (+vals.monthlyDebt || 0);
    const maxPiti = Math.min(maxPiti28, maxPiti36);
    // Iteratively solve for max home price (since taxes scale with price)
    // Start with rough estimate, refine.
    let homePrice = Math.max(0, (+vals.downPayment || 0));
    for (let i = 0; i < 60; i++) {
      const loan = Math.max(0, homePrice - (+vals.downPayment || 0));
      const pi = monthlyPI(loan, +vals.rate || 0, +vals.term || 30);
      const taxes = (homePrice * (+vals.propTaxPct || 0) / 100) / 12;
      const piti = pi + taxes + insMonthly + hoaMonthly;
      // If we're under, raise price; if over, lower. Bisection-like step.
      const diff = maxPiti - piti;
      if (Math.abs(diff) < 1) break;
      // Estimate price sensitivity: each $1 in home price adds ~$1 of loan
      // plus small tax delta. Use a damped step.
      const step = diff * 100; // empirical
      homePrice = Math.max(0, homePrice + step);
      if (homePrice > 50_000_000) break; // sanity guard
    }
    homePrice = Math.round(homePrice);
    const loan = Math.max(0, homePrice - (+vals.downPayment || 0));
    const pi = monthlyPI(loan, +vals.rate || 0, +vals.term || 30);
    const taxes = (homePrice * (+vals.propTaxPct || 0) / 100) / 12;
    const piti = pi + taxes + insMonthly + hoaMonthly;
    const totalInterest = pi * (+vals.term || 30) * 12 - loan;
    return {
      homePrice, loan, pi, taxes, insMonthly, hoaMonthly, piti,
      totalInterest, monthInc, maxHousing28, maxTotal36,

/* ================ ASSET ALLOCATION (3-FUND PORTFOLIO) ================
   The canonical "boring index" portfolio framework: a stock/bond split
   driven by age and risk tolerance, with stocks further split between
   US and international. Educational — not a recommendation to buy any
   specific security.

   Formulas:
     stockPct = clamp(N - age, 30, 95) where N varies by risk tolerance
       - Conservative: N = 110
       - Moderate:     N = 120
       - Aggressive:   N = 130
     bondPct = 100 - stockPct
     Of stocks: 60% US (VTI), 40% international (VXUS) — Bogleheads default

   Range bounded to keep extremes sane (no 100% bonds at 80, no 100%
   stocks for a 22-year-old, etc.).
*/

const RISK_LEVELS = {
  conservative: { N: 110, label: "Conservative", note: "Smoother ride, lower returns. Good if 5-10 years from needing the money." },
  moderate:     { N: 120, label: "Moderate",     note: "Bogleheads default. Balances growth and volatility for long horizons." },
  aggressive:   { N: 130, label: "Aggressive",   note: "Higher long-term growth, deeper drawdowns. Best for 20+ year horizons." },
};

function computeTargetAllocation(age, risk) {
  const r = RISK_LEVELS[risk] || RISK_LEVELS.moderate;
  const stockPct = Math.max(30, Math.min(95, r.N - (age || 30)));
  const bondPct = 100 - stockPct;
  const usStockPct  = Math.round(stockPct * 0.6);
  const intlStockPct = stockPct - usStockPct;
  return { stockPct, bondPct, usStockPct, intlStockPct, riskInfo: r };
}

function computeNetWorthMilestones() {
  const comp = wealthComposition();
  const current = comp.total;
  const celebrated = DB.celebratedMilestones || {};
  const hit = NW_MILESTONES.filter(m => current >= m.value);
  // Next = first milestone above current; null if at top
  const next = NW_MILESTONES.find(m => m.value > current) || null;
  const lastHit = hit[hit.length - 1] || null;
  const progress = next
    ? Math.max(0, Math.min(100, ((current - (lastHit?.value || 0)) / (next.value - (lastHit?.value || 0))) * 100))
    : 100;
  const uncelebrated = hit.filter(m => !celebrated[String(m.value)]);
  return { current, hit, next, lastHit, progress, uncelebrated };
}

// Called from snapshotNetWorth to detect newly-crossed milestones.
// Fires a celebration for each unclebrated milestone (usually just 1).
function checkNetWorthMilestones() {
  const r = computeNetWorthMilestones();
  if (!r.uncelebrated.length) return;
  DB.celebratedMilestones = DB.celebratedMilestones || {};
  for (const m of r.uncelebrated) {
    DB.celebratedMilestones[String(m.value)] = Date.now();
  }
  save();
  // Use the highest newly-celebrated milestone for the toast (in case the user
  // crossed multiple between snapshots — rare but possible with big swings).
  const m = r.uncelebrated[r.uncelebrated.length - 1];
  toast(`🎉 ${m.title} — ${m.quote.split(".")[0]}!`);
  try { celebrate(1.2); } catch {}
}

// Estimate monthly spend by category from existing data.
// Plaid transactions (when present) are the best source; falls back to budget.
function estimatedMonthlySpendByCategory() {
  const out = {};
  CARD_CATEGORIES.forEach(c => { out[c.id] = 0; });
  // From Plaid transactions: average per month over the last 90 days.
  const txs = (DB.spend || []).filter(t => t.source === "plaid" && +t.amount > 0);
  if (txs.length > 0) {
    const cutoff = Date.now() - 90 * 86400000;
    const recent = txs.filter(t => new Date(t.date).getTime() >= cutoff);
    if (recent.length > 0) {
      const map = {};
      for (const t of recent) {
        const c = (t.category || "").toLowerCase();
        let key = "other";
        if (/dining|restaurant|food|coffee/.test(c)) key = "dining";
        else if (/grocer|publix|sprouts|trader|whole foods|wal.?mart|target|costco/.test(c)) key = "groceries";
        else if (/gas|fuel|shell|chevron|exxon|bp\b/.test(c)) key = "gas";
        else if (/travel|hotel|airline|flight|airbnb/.test(c)) key = "travel";
        else if (/netflix|spotify|hulu|disney|streaming/.test(c)) key = "streaming";
        else if (/amazon|amzn|online|ebay/.test(c)) key = "online";
        map[key] = (map[key] || 0) + (+t.amount || 0);
      }
      Object.keys(out).forEach(k => { out[k] = (map[k] || 0) / 3; });
      return out;
    }
  }
  // Fallback: derive from budget.expenses by name (rough)
  for (const e of (DB.budget?.expenses || [])) {
    const name = (e.c || "").toLowerCase();
    let key = "other";
    if (/dining|restaurant|food/.test(name)) key = "dining";
    else if (/grocer/.test(name)) key = "groceries";
    else if (/gas|fuel/.test(name)) key = "gas";
    else if (/travel|trip/.test(name)) key = "travel";
    else if (/stream|netflix|spotify/.test(name)) key = "streaming";
    else if (/amazon|online|shop/.test(name)) key = "online";
    out[key] += (+e.amount || 0);
  }
  return out;
}

function computeCardRewards(card, monthlyByCategory) {
  let annualReward = 0;
  for (const c of CARD_CATEGORIES) {
    const monthly = monthlyByCategory[c.id] || 0;
    const rate = card.rewards[c.id] || card.rewards.other || 0;
    annualReward += monthly * 12 * rate;
  }
  const net = annualReward - card.annualFee;
  return { annualReward, net, fee: card.annualFee };
}

function recommendCards(monthlyByCategory) {
  return CURATED_CARDS
    .map(card => ({ card, ...computeCardRewards(card, monthlyByCategory) }))
    .sort((a,b) => b.net - a.net);
}

/* ================ FIRE CALCULATOR ================
   Financial Independence / Retire Early math: when does the user's
   invested balance reach a multiple of their annual expenses such that
   safe withdrawal sustains them indefinitely?

   FI number = annual_expenses × (100 / withdrawal_rate%)
   At 4% rule: FI = 25 × annual_expenses
   At 3.5% rule: FI = ~28.6 × annual_expenses (more conservative)

   Time to FI: simulate compound growth month-by-month until
   balance ≥ FI number, capped at 80 years.
*/

function computeFire(opts) {
  const annualExpenses = Math.max(0, opts.annualExpenses || 0);
  const withdrawalRate = Math.max(1, Math.min(10, opts.withdrawalRate || 4));
  const balance0 = Math.max(0, opts.currentBalance || 0);
  const monthly = Math.max(0, opts.monthlyContribution || 0);
  const annualReturn = Math.max(0, Math.min(20, opts.annualReturn || 7));
  const monthlyR = (annualReturn / 100) / 12;
  const fiNumber = annualExpenses * (100 / withdrawalRate);
  const result = { fiNumber, annualExpenses, withdrawalRate, balance0, monthly, annualReturn, monthsToFi: null, points: [], reached: false };
  if (annualExpenses <= 0) return result;
  if (balance0 >= fiNumber) {
    result.monthsToFi = 0;
    result.reached = true;
    result.points = [{ month: 0, balance: balance0 }];
    return result;
  }
  // Simulate
  let balance = balance0;
  let cappedMonths = 80 * 12;
  const points = [{ month: 0, balance }];
  for (let m = 1; m <= cappedMonths; m++) {
    balance = balance * (1 + monthlyR) + monthly;
    if (m % 12 === 0 || balance >= fiNumber) {
      points.push({ month: m, balance: Math.round(balance) });
    }
    if (balance >= fiNumber) {
      result.monthsToFi = m;
      result.reached = true;
      break;
    }
  }
  result.points = points;
  return result;
}

function fireChart(points, fiNumber, w=300, h=120) {
  if (!points.length) return "";
  const vals = points.map(p => p.balance);
  const max = Math.max(fiNumber, ...vals) || 1;
  const stepX = points.length > 1 ? w / (points.length - 1) : 0;
  const pts = vals.map((v,i) => `${(i*stepX).toFixed(1)},${(h - (v / max) * h).toFixed(1)}`).join(" ");
  const fiY = h - (fiNumber / max) * h;
  return `
    <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%;height:${h}px;display:block;margin-top:10px">
      <defs>
        <linearGradient id="fire-fill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#FF9500" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="#FF9500" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <polygon fill="url(#fire-fill)" points="0,${h} ${pts} ${w},${h}"/>

/* ================ CASH FLOW VISUALIZATION ================
   Where does each monthly dollar actually go? Renders income as a 100% bar
   split into Fixed expenses / Savings target / Discretionary, with a deficit
   warning if fixed + target exceed income.
*/

function computeCashFlow() {
  const income = _playsMonthlyIncome();
  const fixedRecurring = recurringMonthlyTotal("expense");
  const fixedBudget = (DB.budget?.expenses || []).reduce((s,e) => s + (+e.amount || 0), 0);
  const fixed = Math.max(fixedRecurring, fixedBudget);
  const savingsTarget = +DB.settings.monthlySavingsTarget || 0;
  const used = fixed + savingsTarget;
  const discretionary = Math.max(0, income - used);
  const deficit = used > income ? used - income : 0;
  // What % of income each piece represents (when income > 0)
  const pct = (v) => income > 0 ? (v / income) * 100 : 0;
  return {
    income, fixed, savingsTarget, discretionary, deficit, used,
    fixedPct: pct(fixed),
    savingsPct: pct(savingsTarget),
    discretionaryPct: pct(discretionary),
    savingsRate: income > 0 ? (savingsTarget + discretionary) / income : 0,
  };
}

function cashFlowCardHtml() {
  const cf = computeCashFlow();
  if (cf.income <= 0) return "";
  const ROW = (label, value, pct, color) => `
    <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--sep)">
      <div style="width:10px;height:10px;background:${color};border-radius:2px;flex-shrink:0"></div>
      <div style="flex:1;font-size:13px">${label}</div>
      <div style="font-size:11px;color:var(--t3);min-width:38px;text-align:right">${pct.toFixed(0)}%</div>
      <div style="font-weight:600;min-width:80px;text-align:right" data-priv="amount">${fmt$0(value)}</div>
    </div>
  `;
  return `
    <div style="background:var(--card);border:1px solid var(--sep);border-radius:var(--r);padding:14px;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px">
        <div style="font-size:12px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.4px">Monthly cash flow</div>
        <div style="font-size:12px;color:var(--t3)" data-priv="amount">${fmt$0(cf.income)}/mo in</div>
      </div>
      <div style="display:flex;height:22px;border-radius:6px;overflow:hidden;background:var(--bg-elev);margin-bottom:6px">
        ${cf.fixedPct > 0 ? `<div style="width:${Math.min(100, cf.fixedPct)}%;background:#FF9500" title="Fixed expenses"></div>` : ""}
        ${cf.savingsPct > 0 ? `<div style="width:${Math.min(100, cf.savingsPct)}%;background:#34C759" title="Savings target"></div>` : ""}
        ${cf.discretionaryPct > 0 ? `<div style="width:${Math.min(100, cf.discretionaryPct)}%;background:#007AFF" title="Discretionary"></div>` : ""}
      </div>
      ${ROW("Fixed (rent, bills, etc.)", cf.fixed, cf.fixedPct, "#FF9500")}
      ${cf.savingsTarget > 0 ? ROW("Savings target", cf.savingsTarget, cf.savingsPct, "#34C759") : ""}
      ${ROW("Discretionary", cf.discretionary, cf.discretionaryPct, "#007AFF")}
      ${cf.deficit > 0 ? `
        <div style="margin-top:10px;padding:8px 10px;background:rgba(255,59,48,0.1);border-radius:8px;font-size:12px;color:var(--red);line-height:1.4">
          ⚠️ Fixed expenses + savings target exceed income by ${fmt$0(cf.deficit)}/mo. Reduce one or grow income to close the gap.
        </div>
      ` : ""}
      ${cf.deficit === 0 && cf.income > 0 ? `
        <div style="margin-top:8px;font-size:11px;color:var(--t3);text-align:right">
          Savings rate: <b style="color:${cf.savingsRate >= 0.2 ? "var(--green)" : cf.savingsRate >= 0.1 ? "var(--orange)" : "var(--t2)"}">${(cf.savingsRate*100).toFixed(0)}%</b> of income survives fixed bills
        </div>
      ` : ""}
    </div>
  `;
}

    body: "Robert Kiyosaki's simplification (Rich Dad, Poor Dad): an asset is something that puts money in your pocket. A liability takes money out.\n\nThis is purposefully different from accounting definitions. A house you live in is an accounting asset (it has resale value) but functions as a liability (you pay it each month). A rental property is an asset (it pays you monthly).\n\nThe principle: pile up things that pay you. Avoid (or minimize) things that drain you.\n\n**True assets:** Index funds (dividends + appreciation), rental property (cash flow + appreciation), businesses you own, royalties, dividend stocks.\n\n**Functional liabilities even though they 'feel' like assets:** Primary home (you pay it), vehicles (depreciating + insurance + gas + repairs), boats, expensive watches, jewelry.\n\nThis isn't anti-house. It's anti-confusing-the-categories. Own a home if you want to — but recognize the monthly cost and don't tell yourself it's 'investing.'\n\nThe wealth-building shift: spend less on liabilities so you can buy more assets. The assets eventually pay for some of the liabilities — that's financial independence.\n\nPractical: every dollar you redirect from a liability to an asset compounds for life. Skip the $50k truck upgrade, put it in index funds, in 30 years you have $400k. The truck would have been scrap.",

/* ================ TAX PLANNING ================
   Federal income tax bracket calculator + contribution-savings projector.
   Educational, not advice. State taxes vary widely and aren't modeled in v1.

   Brackets and standard deductions are 2024 IRS numbers — close enough for
   2025-2026 planning given typical year-over-year inflation adjustments
   (~2-3%). Update annually for accuracy.
*/
const TAX_DATA_2024 = {
  brackets: {
    // [top of bracket, marginal rate]. Last bracket has Infinity as top.
    single: [
      [11600, 0.10], [47150, 0.12], [100525, 0.22], [191950, 0.24],
      [243725, 0.32], [609350, 0.35], [Infinity, 0.37],
    ],
    married: [
      [23200, 0.10], [94300, 0.12], [201050, 0.22], [383900, 0.24],
      [487450, 0.32], [731200, 0.35], [Infinity, 0.37],
    ],
    hoh: [
      [16550, 0.10], [63100, 0.12], [100500, 0.22], [191950, 0.24],
      [243700, 0.32], [609350, 0.35], [Infinity, 0.37],
    ],
  },
  stdDeduction: {
    single: 14600,
    married: 29200,
    hoh: 21900,
  },
};

function computeFederalTax(grossIncome, filingStatus) {
  const fs = (filingStatus === "married" || filingStatus === "hoh") ? filingStatus : "single";
  const brackets = TAX_DATA_2024.brackets[fs];
  const stdDed = TAX_DATA_2024.stdDeduction[fs];
  const taxable = Math.max(0, grossIncome - stdDed);
  let tax = 0;
  let lastTop = 0;
  let marginalRate = brackets[0][1];
  const breakdown = []; // for the bracket detail UI
  for (const [top, rate] of brackets) {
    if (taxable <= 0) break;
    if (taxable > top) {
      const slice = top - lastTop;
      tax += slice * rate;
      breakdown.push({ top, rate, slice, taxOwed: slice * rate });
      lastTop = top;
      marginalRate = rate;
    } else {
      const slice = taxable - lastTop;
      if (slice > 0) {
        tax += slice * rate;
        breakdown.push({ top: taxable, rate, slice, taxOwed: slice * rate });
      }
      marginalRate = rate;
      break;
    }
  }
  const effectiveRate = grossIncome > 0 ? tax / grossIncome : 0;
  return { tax, taxable, stdDed, marginalRate, effectiveRate, breakdown, filingStatus: fs };
}

    </div>
    <div class="actions" style="margin-top:14px">

  `);

  const refresh = () => {
    const inc = +$("#tax-income").value || 0;
    const fs = $("#tax-filing").value;

/* ================ ACCOUNT-PRIORITY PYRAMID ================
   The canonical FI-community priority order for where each dollar should
   go. Computed against DB + DB.profile; surfaces the next step the user
   should focus on, marks completed steps, and recommends actions for the
   active step.

   Steps (in order):
     1. Crush high-APR debt (anything ≥ 7%)
     2. Build emergency fund (3-6 months of expenses)
     3. Capture 401k employer match
     4. Max your Roth IRA
     5. Max your HSA (if eligible)
     6. Max 401k beyond the match
     7. Open / fund a taxable brokerage

   Steps users haven't reached are shown locked; this is a priority guide,
   not a strict gate — the sheet notes that parallel pursuit is fine.
*/

// Reset the per-year "I did it" flags if the stored year is stale.
function _ensurePyramidFlagsCurrent() {
  if (!DB.profile) return;
  const year = new Date().getFullYear();
  if (DB.profile.pyramidFlagsYear !== year) {
    DB.profile.k401MatchClaimed = false;
    DB.profile.rothMaxedYTD = false;
    DB.profile.hsaMaxedYTD = false;
    DB.profile.k401MaxedYTD = false;
    DB.profile.pyramidFlagsYear = year;
  }
}

function accountPriorityPyramid() {
  _ensurePyramidFlagsCurrent();
  const profile = DB.profile || {};
  const monthlyFixed = _playsMonthlyFixed();
  const totalSavings = _playsTotalSavings();
  const months = monthlyFixed > 0 ? totalSavings / monthlyFixed : 0;
  const highApr = _playsHighestAprDebt();
  const comp = wealthComposition();

  const steps = [
    {
      id: "high-apr-debt",
      step: 1, emoji: "🔥",
      title: "Crush high-APR debt",
      done: !(highApr && +highApr.apr >= 7),
      progress: highApr && +highApr.apr >= 7
        ? `${highApr.name} · ${(+highApr.apr).toFixed(1)}% APR · ${fmt$0(highApr.balance)}`
        : "No debt ≥ 7% APR",
      detail: "Any debt with APR ≥ 7% beats most reasonable investments. Pay it off before investing more.",
      action: highApr && +highApr.apr >= 7 ? { label: "Open debts", fn: "showTab('money')" } : null,
    },
    {
      id: "emergency-fund",
      step: 2, emoji: "🛡️",
      title: "Build emergency fund (3-6 mo)",
      done: months >= 3,
      progress: monthlyFixed > 0
        ? `${months.toFixed(1)} months of expenses · ${fmt$0(totalSavings)} saved`
        : "Set monthly fixed expenses to compute",
      detail: "3 months is the safety floor; 6 months gives real flexibility. Cash, not invested.",
      action: months < 3 ? { label: "Add to savings", fn: "addSavingSheet()" } : null,
    },
    {
      id: "401k-match",
      step: 3, emoji: "🎁",
      title: "Capture 401k employer match",
      done: !profile.employerMatch || !!profile.k401MatchClaimed,
      progress: profile.employerMatch
        ? (profile.k401MatchClaimed ? "Match claimed for " + new Date().getFullYear() : "Not yet contributing to match")
        : "No employer match (per profile)",
      detail: "An employer match is an instant 50-100% return. Always contribute at least enough to get the full match.",
      action: profile.employerMatch && !profile.k401MatchClaimed
        ? { label: "Mark as claimed", fn: "togglePyramidFlag('k401MatchClaimed')" }
        : null,
      toggleable: profile.employerMatch,
      flagKey: "k401MatchClaimed",
    },
    {
      id: "roth-ira",
      step: 4, emoji: "🎯",
      title: "Max your Roth IRA",
      done: !!profile.rothMaxedYTD,
      progress: profile.rothMaxedYTD
        ? "Maxed for " + new Date().getFullYear()
        : (() => {
            const age = _playsAge();
            const limit = _iraLimit(new Date().getFullYear(), age);
            return `Target: ${fmt$0(limit)} this year`;
          })(),
      detail: "Post-tax in, tax-free growth forever, tax-free withdrawals after 59½. Best account in personal finance.",
      action: !profile.rothMaxedYTD
        ? { label: "Mark as maxed", fn: "togglePyramidFlag('rothMaxedYTD')" }
        : null,
      toggleable: true,
      flagKey: "rothMaxedYTD",
    },
    {
      id: "hsa",
      step: 5, emoji: "🏥",
      title: "Max your HSA",
      done: !profile.hsaEligible || !!profile.hsaMaxedYTD,
      progress: profile.hsaEligible
        ? (profile.hsaMaxedYTD ? "Maxed for " + new Date().getFullYear() : "Eligible — not yet maxed")
        : "Not HDHP-eligible (per profile)",
      detail: "Triple tax advantage: pre-tax in, tax-free growth, tax-free out for medical. Best account in the entire tax code.",
      action: profile.hsaEligible && !profile.hsaMaxedYTD
        ? { label: "Mark as maxed", fn: "togglePyramidFlag('hsaMaxedYTD')" }
        : null,
      toggleable: profile.hsaEligible,
      flagKey: "hsaMaxedYTD",
    },
    {
      id: "max-401k",
      step: 6, emoji: "💼",
      title: "Max 401k beyond match",
      done: !!profile.k401MaxedYTD,
      progress: profile.k401MaxedYTD
        ? "Maxed for " + new Date().getFullYear()
        : "After match, fill more pre-tax / Roth 401k room",
      detail: "Once Roth IRA + HSA are maxed, additional 401k contributions still get tax advantages.",
      action: !profile.k401MaxedYTD
        ? { label: "Mark as maxed", fn: "togglePyramidFlag('k401MaxedYTD')" }
        : null,
      toggleable: true,
      flagKey: "k401MaxedYTD",
    },
    {
      id: "taxable",
      step: 7, emoji: "📈",
      title: "Fund a taxable brokerage",
      done: comp.investments > 0,
      progress: comp.investments > 0
        ? `${fmt$0(comp.investments)} invested`
        : "Nothing in taxable yet",
      detail: "Once tax-advantaged accounts are maxed, taxable brokerage is the next step. Long-term holds = favorable capital-gains treatment.",
      action: comp.investments === 0 ? { label: "Track first investment", fn: "assetSheet()" } : null,
    },
  ];

  // Find the active step: first not-done. Subsequent steps marked as "locked"
  // visually, though we don't actually prevent the user from doing them in parallel.
  let activeIdx = steps.findIndex(s => !s.done);
  if (activeIdx === -1) activeIdx = steps.length; // all done
  steps.forEach((s, i) => {
    s.status = i < activeIdx ? "complete" : i === activeIdx ? "active" : "locked";
  });

  return { steps, activeIdx, allDone: activeIdx === steps.length };
}

function togglePyramidFlag(key) {
  _ensurePyramidFlagsCurrent();

       </div>`

  openSheet(`
