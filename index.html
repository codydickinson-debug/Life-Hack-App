<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />

<!-- iOS PWA meta -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Ascend" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="manifest" href="manifest.json" />

<!--
  Content Security Policy
  - 'unsafe-inline' on script/style is required because the entire app is one inline <script>
    plus inline onclick=/oninput= handlers on rendered HTML; rewriting that is a separate refactor.
  - script-src is pinned to self + cdn.plaid.com so even with 'unsafe-inline', injected <script src=...>
    pointing at a foreign domain is rejected.
  - connect-src 'self' https: lets the user-configured backend Worker work over HTTPS only.
    Plain http: backends are blocked (which is what we want).
  - frame-src restricted to Plaid (the only iframe surface in normal use).
  - object-src 'none' + base-uri 'self' close the usual XSS escalation paths.
-->
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' 'unsafe-inline' https://cdn.plaid.com;
  style-src 'self' 'unsafe-inline';
  img-src 'self' data: blob:;
  font-src 'self' data:;
  connect-src 'self' https:;
  frame-src 'self' https://*.plaid.com;
  frame-ancestors 'self';
  base-uri 'self';
  object-src 'none';
  form-action 'self';
  manifest-src 'self';
  worker-src 'self';
" />
<meta http-equiv="X-Content-Type-Options" content="nosniff" />
<meta name="referrer" content="no-referrer" />

<!-- Plaid Link (loaded; only used after user taps Connect bank).
     We don't pin SRI here because Plaid updates the stable URL in place; pinning
     would break the app whenever they push a fix. CSP above restricts script origin. -->
<script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js" defer></script>

<title>Ascend</title>

<style>
/* ================ DESIGN TOKENS ================ */
:root {
  /* Surfaces — refined neutrals with the slightest warmth */
  --bg:        #F7F7F5;
  --bg-elev:   #EFEFEC;
  --bg-elev2:  #E5E5E1;
  --card:      #FFFFFF;
  --sep:       rgba(17,17,19,.06);
  --sep-2:     rgba(17,17,19,.10);

  /* Text — refined hierarchy */
  --t1:        #0A0A0B;
  --t2:        #46464D;
  --t3:        #86868D;
  --t4:        #B8B8BD;

  /* Accents — calibrated system colors */
  --blue:      #2F6FEB;
  --green:     #2EB875;
  --red:       #E04545;
  --orange:    #ED8B22;
  --yellow:    #E0B520;
  --purple:    #8957D9;
  --pink:      #E64178;
  --indigo:    #4F4ED1;
  --teal:      #36B0CC;

  /* Elevation — for the App-Store-grade card feel */
  --sh-1:      0 1px 2px rgba(15,17,21,0.04), 0 1px 3px rgba(15,17,21,0.04);
  --sh-2:      0 2px 4px rgba(15,17,21,0.04), 0 6px 20px rgba(15,17,21,0.06);
  --sh-pop:    0 4px 12px rgba(15,17,21,0.06), 0 16px 40px rgba(15,17,21,0.10);
  --sh-hero:   0 1px 2px rgba(0,0,0,0.10), 0 12px 32px rgba(0,0,0,0.18);

  /* Geometry — generous corners, Apple-modern */
  --r:         16px;
  --r2:        12px;
  --r3:        8px;
  --r-pill:    100px;

  /* Spacing scale */
  --s1: 4px; --s2: 8px; --s3: 12px; --s4: 16px; --s5: 20px; --s6: 24px; --s7: 32px;

  --sa-top:    env(safe-area-inset-top, 0px);
  --sa-bot:    env(safe-area-inset-bottom, 0px);

  --font:      -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Inter", system-ui, "Segoe UI", Roboto, sans-serif;
  --font-num:  "SF Pro Display", -apple-system, "Inter", system-ui, sans-serif;
  --tab-h:     calc(64px + var(--sa-bot));
}

@media (prefers-color-scheme: dark) {
  :root.theme-auto {
    --bg:        #0A0A0C;
    --bg-elev:   #16161A;
    --bg-elev2:  #22222A;
    --card:      #16161A;
    --sep:       rgba(255,255,255,.06);
    --sep-2:     rgba(255,255,255,.10);
    --t1:        #F5F5F7;
    --t2:        #B5B5BA;
    --t3:        #7A7A82;
    --t4:        #4A4A52;
    --sh-1:      0 1px 2px rgba(0,0,0,0.30), 0 1px 3px rgba(0,0,0,0.20);
    --sh-2:      0 2px 4px rgba(0,0,0,0.30), 0 6px 20px rgba(0,0,0,0.30);
    --sh-pop:    0 4px 12px rgba(0,0,0,0.40), 0 16px 40px rgba(0,0,0,0.45);
  }
}
:root.theme-dark {
  --bg:        #0A0A0C;
  --bg-elev:   #16161A;
  --bg-elev2:  #22222A;
  --card:      #16161A;
  --sep:       rgba(255,255,255,.06);
  --sep-2:     rgba(255,255,255,.10);
  --t1:        #F5F5F7;
  --t2:        #B5B5BA;
  --t3:        #7A7A82;
  --t4:        #4A4A52;
  --sh-1:      0 1px 2px rgba(0,0,0,0.30), 0 1px 3px rgba(0,0,0,0.20);
  --sh-2:      0 2px 4px rgba(0,0,0,0.30), 0 6px 20px rgba(0,0,0,0.30);
  --sh-pop:    0 4px 12px rgba(0,0,0,0.40), 0 16px 40px rgba(0,0,0,0.45);
}

/* ================ BASE ================ */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overscroll-behavior-y: none; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--t1);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  letter-spacing: -0.005em;
  font-feature-settings: "ss01", "cv11";
}
.num { font-family: var(--font-num); font-variant-numeric: tabular-nums; letter-spacing: -0.022em; }
button, input, select, textarea {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
  background: none;
  border: none;
  outline: none;
}
button { cursor: pointer; }
input, textarea { -webkit-appearance: none; }
input::placeholder, textarea::placeholder { color: var(--t4); }

/* ================ APP SHELL ================ */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
  background: var(--bg);
}

#topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: calc(var(--sa-top) + 12px) 20px 10px;
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 5;
  border-bottom: .5px solid transparent;
  transition: border-color .2s, background .2s;
}
#topbar.scrolled {
  border-bottom-color: var(--sep);
  background: rgba(247,247,245,0.78);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  backdrop-filter: saturate(180%) blur(20px);
}
@media (prefers-color-scheme: dark) {
  :root.theme-auto #topbar.scrolled { background: rgba(10,10,12,0.78); }
}
:root.theme-dark #topbar.scrolled { background: rgba(10,10,12,0.78); }

.tb-title { font-size: 17px; font-weight: 600; letter-spacing: -.2px; }
.tb-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: var(--bg-elev);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 15px; color: var(--t2);
  border: 0.5px solid var(--sep);
  transition: transform .15s ease, background .15s ease, color .15s ease;
}
.tb-btn:hover { color: var(--t1); }
.tb-btn:active { transform: scale(.92); background: var(--bg-elev2); }
.tb-greet { display: flex; flex-direction: column; gap: 2px; }
.tb-hello { font-size: 11px; color: var(--t3); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
.tb-name  { font-size: 19px; font-weight: 700; letter-spacing: -0.022em; line-height: 1.15; color: var(--t1); }

#content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 4px 0 calc(var(--tab-h) + 28px);
  scroll-behavior: smooth;
}
#content::-webkit-scrollbar { width: 0; height: 0; }
.page { display: none; padding: 0 20px; }
.page.active { display: block; animation: fadeIn .28s cubic-bezier(.32,.72,.34,1); }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px);} to { opacity: 1; transform: none; } }

/* Accessible focus state for keyboard users */
:focus-visible {
  outline: 2px solid var(--blue);
  outline-offset: 2px;
  border-radius: 6px;
}
button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible { outline-offset: 3px; }

/* ================ TAB BAR ================ */
#tabbar {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  display: flex;
  justify-content: space-around;
  align-items: stretch;
  padding-bottom: var(--sa-bot);
  background: rgba(247,247,245,0.82);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  backdrop-filter: saturate(180%) blur(20px);
  border-top: .5px solid var(--sep);
  z-index: 10;
}
@media (prefers-color-scheme: dark) {
  :root.theme-auto #tabbar { background: rgba(10,10,12,0.78); }
}
:root.theme-dark #tabbar { background: rgba(10,10,12,0.78); }

.tab {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px;
  padding: 10px 0 6px;
  color: var(--t3);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.02em;
  transition: color .15s ease, transform .15s ease;
  position: relative;
}
.tab .ic {
  font-size: 18px;
  line-height: 1;
  opacity: 0.7;
  transition: opacity .15s ease, transform .2s cubic-bezier(.34,1.56,.64,1), color .15s ease;
}
.tab.active { color: var(--t1); }
.tab.active .ic { opacity: 1; transform: translateY(-1px); }
.tab:active .ic { transform: scale(.88); }

/* ================ TYPOGRAPHY / SECTIONS ================ */
.lg-title {
  font-size: 34px;
  font-weight: 700;
  letter-spacing: -0.028em;
  margin: 8px 0 20px;
  line-height: 1.1;
  color: var(--t1);
}
.section-h {
  display: flex; align-items: baseline; justify-content: space-between;
  margin: 28px 2px 12px;
}
.section-h .lbl {
  font-size: 11px;
  font-weight: 700;
  color: var(--t3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.section-h .act {
  font-size: 13px;
  color: var(--blue);
  font-weight: 600;
  letter-spacing: -0.005em;
  transition: opacity .15s;
}
.section-h .act:active { opacity: .6; }

/* ================ LISTS / CARDS (iOS grouped) ================ */
.list {
  background: var(--card);
  border-radius: var(--r);
  overflow: hidden;
  margin-bottom: 12px;
  border: 0.5px solid var(--sep);
  box-shadow: var(--sh-1);
}
.list .row {
  display: flex; align-items: center;
  gap: 12px;
  padding: 14px 16px;
  position: relative;
  min-height: 56px;
  background: var(--card);
  transition: background .15s ease;
}
.list .row + .row::before {
  content: "";
  position: absolute;
  top: 0; left: 56px; right: 16px;
  height: .5px;
  background: var(--sep);
}
.row .lead {
  font-size: 22px;
  line-height: 1;
  min-width: 28px;
  text-align: center;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.row .body { flex: 1; min-width: 0; }
.row .body .t1 { font-size: 15px; font-weight: 500; color: var(--t1); letter-spacing: -0.005em; }
.row .body .t2 { font-size: 12px; color: var(--t3); margin-top: 3px; line-height: 1.4; }
.row .trail { color: var(--t3); font-size: 14px; display: flex; align-items: center; gap: 8px; }
.row .chev::after { content: "›"; font-size: 22px; color: var(--t4); margin-left: 4px; line-height: .8; transform: translateY(-1px); font-weight: 300; }

.row.tappable { cursor: pointer; }
.row.tappable:active { background: var(--bg-elev); }

/* ================ BUTTONS ================ */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px;
  padding: 14px 20px;
  border-radius: var(--r2);
  font-size: 15px;
  font-weight: 600;
  background: var(--t1);
  color: var(--bg);
  transition: opacity .15s ease, transform .15s ease, background .15s ease;
  width: 100%;
  letter-spacing: -0.01em;
  border: none;
  -webkit-user-select: none;
  user-select: none;
}
.btn:hover { opacity: .92; }
.btn:active { opacity: .85; transform: scale(.985); }
.btn.secondary {
  background: var(--bg-elev);
  color: var(--t1);
  border: 0.5px solid var(--sep-2);
}
.btn.secondary:active { background: var(--bg-elev2); }
.btn.danger    { background: var(--red); color: #fff; }
.btn.ghost     { background: transparent; color: var(--t1); }
.btn.sm {
  padding: 8px 14px;
  font-size: 12.5px;
  border-radius: var(--r3);
  width: auto;
  font-weight: 600;
  letter-spacing: -0.005em;
}

.add-row {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px;
  background: var(--card);
  color: var(--t1);
  font-size: 14px;
  font-weight: 500;
  border-radius: var(--r);
  margin-bottom: 12px;
  width: 100%;
  text-align: left;
  border: 0.5px solid var(--sep);
  letter-spacing: -0.005em;
  box-shadow: var(--sh-1);
  transition: background .15s ease, transform .15s ease;
}
.add-row:active { background: var(--bg-elev); transform: scale(.995); }
.add-row .plus {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--bg-elev2);
  color: var(--t2);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 17px; font-weight: 400;
  line-height: 1;
}

/* ================ HABIT / CHECK ================ */
.check {
  width: 24px; height: 24px;
  min-width: 24px;
  border-radius: 50%;
  border: 1.5px solid var(--bg-elev2);
  background: transparent;
  display: inline-flex; align-items: center; justify-content: center;
  color: transparent;
  font-size: 12px;
  font-weight: 700;
  transition: transform .18s cubic-bezier(.34,1.56,.64,1), background .15s, border-color .15s, color .15s;
}
.check.done {
  background: var(--t1);
  border-color: var(--t1);
  color: var(--bg);
}
.check:active { transform: scale(.82); }

.streak-pill {
  background: rgba(237,139,34,0.10);
  color: var(--orange);
  font-size: 11px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: var(--r-pill);
  letter-spacing: -0.005em;
  display: inline-flex; align-items: center; gap: 4px;
  border: 0.5px solid rgba(237,139,34,0.18);
  font-variant-numeric: tabular-nums;
}

/* ================ HERO / TODAY FOCUS ================ */
.hero {
  background:
    radial-gradient(120% 80% at 100% 0%, rgba(94,224,160,0.12) 0%, rgba(94,224,160,0) 50%),
    linear-gradient(180deg, #18181C 0%, #0F0F12 100%);
  color: #F5F5F7;
  border-radius: var(--r);
  padding: 24px 22px 26px;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
  border: 0.5px solid rgba(255,255,255,0.06);
  box-shadow: var(--sh-hero);
}
.hero::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.10), transparent);
  pointer-events: none;
}
.hero .h-eyebrow { font-size: 11px; font-weight: 600; color: rgba(245,245,247,0.55); letter-spacing: 0.08em; text-transform: uppercase; }
.hero .h-big {
  font-size: 30px;
  font-weight: 700;
  letter-spacing: -0.028em;
  margin-top: 8px;
  line-height: 1.12;
  color: #F5F5F7;
}
.hero .h-sub { font-size: 13.5px; color: rgba(245,245,247,0.66); margin-top: 6px; line-height: 1.4; }
.hero .h-bar { height: 5px; background: rgba(255,255,255,.10); border-radius: 4px; margin-top: 18px; overflow: hidden; }
.hero .h-fill { height: 100%; background: linear-gradient(90deg, #2EB875, #5EE0A0); border-radius: 4px; transition: width .7s cubic-bezier(.34,1.56,.64,1); box-shadow: 0 0 12px rgba(94,224,160,0.45); }
.hero::after { display: none; }

/* ================ STATS / GRID ================ */
.kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.kpi {
  background: var(--card);
  border-radius: var(--r);
  padding: 16px 16px 14px;
  border: 0.5px solid var(--sep);
  box-shadow: var(--sh-1);
  transition: transform .15s ease;
}
.kpi:active { transform: scale(.99); }
.kpi .v {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.028em;
  color: var(--t1);
  font-variant-numeric: tabular-nums;
  line-height: 1.1;
}
.kpi .l { font-size: 11.5px; color: var(--t3); margin-top: 4px; font-weight: 600; letter-spacing: 0.01em; }
.kpi .ic { font-size: 14px; opacity: 0.6; }
.kpi .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; color: var(--t3); font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }

/* ================ PROGRESS / SAVINGS CARDS ================ */
.sav-card {
  background: var(--card);
  border-radius: var(--r);
  padding: 18px;
  margin-bottom: 10px;
  position: relative;
  border: 0.5px solid var(--sep);
  box-shadow: var(--sh-1);
  transition: transform .15s ease, box-shadow .2s ease;
}
.sav-card:active { transform: scale(.995); }
.sav-top { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.sav-icon {
  width: 40px; height: 40px; border-radius: 12px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 20px;
  box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.04);
}
.sav-name { font-size: 15.5px; font-weight: 600; flex: 1; letter-spacing: -0.01em; color: var(--t1); }
.sav-amount { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
.sav-cur {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.028em;
  color: var(--t1);
  font-variant-numeric: tabular-nums;
}
.sav-tar { font-size: 13px; color: var(--t3); font-variant-numeric: tabular-nums; }
.sav-bar { height: 8px; background: var(--bg-elev); border-radius: 100px; overflow: hidden; margin-bottom: 10px; }
.sav-fill { height: 100%; border-radius: 100px; transition: width .7s cubic-bezier(.34,1.56,.64,1); }
.sav-foot { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--t3); }
.sav-met { color: var(--green); font-weight: 700; }
.sav-actions { display: flex; gap: 6px; }
.sav-actions .btn.sm { padding: 6px 10px; font-size: 12px; }

/* ================ GOALS ================ */
.tier-pills { display: flex; gap: 6px; overflow-x: auto; margin: 4px 0 14px; padding-bottom: 4px; }
.tier-pills::-webkit-scrollbar { display: none; }
.tier-pill {
  flex-shrink: 0;
  padding: 8px 16px;
  border-radius: var(--r-pill);
  background: var(--card);
  border: 0.5px solid var(--sep-2);
  color: var(--t2);
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  letter-spacing: -0.005em;
  transition: all .18s ease;
}
.tier-pill:active { transform: scale(.96); }
.tier-pill.active { background: var(--t1); border-color: var(--t1); color: var(--bg); }

.goal-item {
  background: var(--card);
  border-radius: var(--r);
  margin-bottom: 10px;
  overflow: hidden;
  border: 0.5px solid var(--sep);
  box-shadow: var(--sh-1);
}
.goal-main { display: flex; align-items: flex-start; gap: 12px; padding: 16px; }
.goal-body { flex: 1; min-width: 0; }
.goal-text { font-size: 15px; font-weight: 600; color: var(--t1); line-height: 1.35; letter-spacing: -0.01em; }
.goal-text.done { color: var(--t3); text-decoration: line-through; font-weight: 500; }
.goal-note { font-size: 12.5px; color: var(--t3); margin-top: 4px; line-height: 1.45; }
.goal-prog-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
.goal-prog-bar { flex: 1; height: 5px; background: var(--bg-elev); border-radius: 100px; overflow: hidden; }
.goal-prog-fill { height: 100%; background: var(--green); border-radius: 100px; transition: width .5s cubic-bezier(.34,1.56,.64,1); }
.goal-prog-lbl { font-size: 12px; color: var(--t3); font-weight: 700; min-width: 32px; text-align: right; font-variant-numeric: tabular-nums; }
.goal-steps { border-top: .5px solid var(--sep); padding: 6px 16px 10px 50px; }
.step {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0;
  border-bottom: .5px solid var(--sep);
}
.step:last-of-type { border-bottom: none; }
.step .check { width: 20px; height: 20px; min-width: 20px; }
.step .check.done { font-size: 11px; }
.step .txt { flex: 1; font-size: 14px; color: var(--t2); line-height: 1.4; }
.step .txt.done { color: var(--t4); text-decoration: line-through; }
.step .x { color: var(--t4); font-size: 18px; padding: 4px; line-height: 1; }
.add-step {
  width: 100%;
  text-align: left;
  padding: 8px 0 4px;
  font-size: 13px;
  color: var(--blue);
  font-weight: 500;
}
.del-x { color: var(--t4); font-size: 20px; padding: 4px 6px; line-height: 1; align-self: flex-start; }

/* ================ MONEY SUB-TABS ================ */
.sub-tabs {
  display: flex;
  border-bottom: 0.5px solid var(--sep);
  margin-bottom: 18px;
  gap: 4px;
  position: relative;
}
.sub-tab {
  flex: 1;
  padding: 11px 0 12px;
  font-size: 13.5px;
  font-weight: 600;
  color: var(--t3);
  text-align: center;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color .2s ease, border-color .2s ease;
  letter-spacing: -0.005em;
}
.sub-tab.active { color: var(--t1); border-bottom-color: var(--t1); font-weight: 700; }

/* Budget */
.budget-hero {
  background: var(--card);
  border-radius: var(--r);
  padding: 26px 18px 22px;
  margin-bottom: 14px;
  text-align: center;
  border: 0.5px solid var(--sep);
  box-shadow: var(--sh-1);
}
.bh-lbl { font-size: 11px; color: var(--t3); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }
.bh-val {
  font-size: 36px;
  font-weight: 700;
  letter-spacing: -0.032em;
  margin: 8px 0 10px;
  color: var(--t1);
  font-variant-numeric: tabular-nums;
  line-height: 1.1;
}
.bh-sub { font-size: 13px; color: var(--t3); font-variant-numeric: tabular-nums; }
.bh-sub .pos { color: var(--green); font-weight: 700; }
.bh-sub .neg { color: var(--red); font-weight: 700; }

.bcat-row { display: flex; align-items: center; padding: 13px 16px; gap: 10px; min-height: 56px; }
.bcat-name { flex: 1; font-size: 15px; font-weight: 500; }
.bcat-amt {
  font-size: 15px; font-weight: 600;
  background: var(--bg-elev);
  padding: 7px 11px;
  border-radius: 8px;
  color: var(--t1);
  text-align: right;
  width: 100px;
  min-width: 0;
  font-variant-numeric: tabular-nums;
  transition: background .15s ease;
}
.bcat-amt:focus { background: var(--bg-elev2); }

/* Spend */
.spend-amount-form {
  background: var(--card);
  border-radius: var(--r);
  padding: 18px;
  margin-bottom: 14px;
  display: grid;
  gap: 12px;
  border: 0.5px solid var(--sep);
  box-shadow: var(--sh-1);
}
.spend-amount-form input, .spend-amount-form select, .spend-amount-form textarea {
  width: 100%;
  padding: 13px 14px;
  background: var(--bg-elev);
  border-radius: var(--r3);
  font-size: 16px;
  border: 0.5px solid transparent;
  transition: background .15s ease, border-color .15s ease;
}
.spend-amount-form input:focus, .spend-amount-form select:focus, .spend-amount-form textarea:focus {
  background: var(--card);
  border-color: var(--sep-2);
}
.spend-amount-form .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.tx-row .body .t1 .amt { font-weight: 700; font-variant-numeric: tabular-nums; }

/* Stats */
.heatmap { display: flex; gap: 4px; padding: 14px 14px 10px; overflow-x: auto; }
.heatmap::-webkit-scrollbar { display: none; }
.hm-col { display: flex; flex-direction: column; gap: 4px; }
.hm-cell { width: 13px; height: 13px; border-radius: 3px; background: var(--bg-elev); transition: transform .15s ease; }
.hm-cell.l1 { background: rgba(52,199,89,.25); }
.hm-cell.l2 { background: rgba(52,199,89,.5); }
.hm-cell.l3 { background: rgba(52,199,89,.75); }
.hm-cell.l4 { background: var(--green); }

/* ================ MODALS / SHEETS ================ */
.scrim {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 50;
  opacity: 0;
  pointer-events: none;
  transition: opacity .28s ease;
  -webkit-backdrop-filter: blur(2px);
  backdrop-filter: blur(2px);
}
.scrim.show { opacity: 1; pointer-events: auto; }

.sheet {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  background: var(--bg);
  border-radius: 22px 22px 0 0;
  z-index: 51;
  transform: translateY(100%);
  transition: transform .35s cubic-bezier(.32,.72,.34,1);
  max-width: 480px;
  margin: 0 auto;
  max-height: 92vh;
  overflow-y: auto;
  padding: 8px 20px calc(var(--sa-bot) + 24px);
  box-shadow: var(--sh-pop);
  border-top: 0.5px solid var(--sep);
}
.sheet.show { transform: translateY(0); }
.sheet .grabber {
  width: 40px; height: 5px;
  background: var(--bg-elev2);
  border-radius: 3px;
  margin: 8px auto 16px;
}
.sheet h2 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.025em;
  margin-bottom: 20px;
  color: var(--t1);
  line-height: 1.2;
}
.sheet label { display: block; font-size: 11px; color: var(--t3); font-weight: 700; margin: 16px 0 6px; text-transform: uppercase; letter-spacing: 0.08em; }
.sheet input, .sheet select, .sheet textarea {
  width: 100%;
  background: var(--bg-elev);
  padding: 14px;
  border-radius: var(--r2);
  font-size: 16px;
  border: 0.5px solid transparent;
  transition: background .15s ease, border-color .15s ease;
}
.sheet input:focus, .sheet select:focus, .sheet textarea:focus {
  background: var(--card);
  border-color: var(--sep-2);
}
.sheet textarea { min-height: 80px; resize: vertical; }
.sheet .actions { display: flex; gap: 10px; margin-top: 20px; }
.sheet .actions .btn { flex: 1; }

.emoji-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
.emoji-pick {
  width: 44px; height: 44px;
  border-radius: 12px;
  background: var(--bg-elev);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 22px;
  transition: background .15s ease, transform .15s ease;
  border: 0.5px solid transparent;
}
.emoji-pick:active { transform: scale(.92); }
.emoji-pick.sel { background: var(--blue); border-color: var(--blue); box-shadow: 0 0 0 3px rgba(47,111,235,0.18); }

.color-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 6px; }
.color-pick {
  width: 34px; height: 34px;
  border-radius: 50%;
  position: relative;
  transition: transform .15s ease;
}
.color-pick:active { transform: scale(.88); }
.color-pick.sel::after {
  content: ""; position: absolute; inset: -3px;
  border: 2px solid var(--t1); border-radius: 50%;
}

/* ================ EMPTY STATES ================ */
.empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--t3);
  background: var(--card);
  border-radius: var(--r);
  border: 0.5px solid var(--sep);
  box-shadow: var(--sh-1);
}
.empty .e-emoji { font-size: 42px; margin-bottom: 12px; opacity: .9; }
.empty .e-title { font-size: 17px; font-weight: 700; color: var(--t1); margin-bottom: 6px; letter-spacing: -0.015em; }
.empty .e-sub { font-size: 14px; line-height: 1.45; max-width: 280px; margin: 0 auto; }

/* ================ TOAST ================ */
#toast {
  position: fixed;
  bottom: calc(var(--tab-h) + 16px);
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(20,20,22,.94);
  color: #fff;
  padding: 12px 20px;
  border-radius: var(--r-pill);
  font-size: 14px;
  font-weight: 600;
  z-index: 100;
  opacity: 0;
  transition: opacity .28s ease, transform .28s ease;
  pointer-events: none;
  white-space: nowrap;
  letter-spacing: -0.005em;
  box-shadow: var(--sh-pop);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ================ DAY CHIPS (mini week ladder) ================ */
.daychips { display: flex; gap: 6px; margin: 0 0 16px; }
.daychip {
  flex: 1;
  text-align: center;
  padding: 11px 0 10px;
  background: var(--card);
  border-radius: var(--r2);
  border: 0.5px solid var(--sep);
  font-size: 11px;
  color: var(--t3);
  letter-spacing: 0.04em;
  font-weight: 600;
  text-transform: uppercase;
  transition: background .15s ease, transform .15s ease;
}
.daychip:active { transform: scale(.95); }
.daychip .n { font-weight: 700; color: var(--t1); font-size: 17px; letter-spacing: -0.022em; margin-top: 2px; font-variant-numeric: tabular-nums; text-transform: none; }
.daychip.today { background: var(--t1); border-color: var(--t1); color: rgba(255,255,255,0.65); }
.daychip.today .n { color: var(--bg); }
.daychip.done .n { color: var(--green); }

/* generic card (used by Stats inline cards) */
.card {
  background: var(--card);
  border-radius: var(--r);
  border: 0.5px solid var(--sep);
  box-shadow: var(--sh-1);
}

/* utility */
.mb12 { margin-bottom: 12px; }
.mb24 { margin-bottom: 24px; }
.muted { color: var(--t3); }
.center { text-align: center; }
.tabnum { font-variant-numeric: tabular-nums; }
hr.sep { border: none; border-top: .5px solid var(--sep); margin: 14px 0; }

input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

/* ===== Onboarding ===== */
.onb-progress { display: flex; gap: 6px; justify-content: center; margin: 4px 0 14px; }
.onb-progress .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--sep-2); }
.onb-progress .dot.active { background: var(--blue); }
.onb-step-h { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; color: var(--t3); text-align: center; margin-bottom: 6px; }
.onb-preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 12px 0 16px; }
.onb-preset-card {
  background: var(--bg-elev); border: 2px solid transparent; border-radius: var(--r2);
  padding: 14px 10px; display: flex; flex-direction: column; align-items: center; gap: 6px;
  cursor: pointer; user-select: none; transition: border-color .12s, background .12s;
}
.onb-preset-card .e { font-size: 24px; }
.onb-preset-card .n { font-size: 13px; font-weight: 600; color: var(--t1); text-align: center; }
.onb-preset-card .s { font-size: 11px; color: var(--t3); text-align: center; }
.onb-preset-card.selected { border-color: var(--blue); background: color-mix(in srgb, var(--blue) 8%, var(--bg-elev)); }
.onb-choice-card {
  background: var(--bg-elev); border: 2px solid transparent; border-radius: var(--r2);
  padding: 14px; cursor: pointer; user-select: none; margin-bottom: 8px; transition: border-color .12s, background .12s;
}
.onb-choice-card .ct { font-size: 15px; font-weight: 600; color: var(--t1); margin-bottom: 2px; }
.onb-choice-card .cs { font-size: 12px; color: var(--t3); line-height: 1.4; }
.onb-choice-card.selected { border-color: var(--blue); background: color-mix(in srgb, var(--blue) 8%, var(--bg-elev)); }

/* ================ ASCEND v3 ADDITIONS ================ */

/* Privacy mode — blur all elements tagged data-priv="amount" */
body.priv-on [data-priv="amount"] {
  filter: blur(7px);
  transition: filter .18s ease;
  cursor: pointer;
  user-select: none;
}
body.priv-on [data-priv="amount"]:hover,
body.priv-on [data-priv="amount"]:active { filter: blur(0); }

/* Confetti canvas overlay */
.confetti-canvas {
  position: fixed; inset: 0; pointer-events: none; z-index: 200;
}

/* Safe-to-spend hero card */
.sts {
  background: linear-gradient(135deg, var(--green) 0%, color-mix(in srgb, var(--green) 65%, var(--blue)) 100%);
  color: #fff;
  border-radius: var(--r);
  padding: 18px 18px 16px;
  margin-bottom: 14px;
  box-shadow: var(--sh-2);
  position: relative;
  overflow: hidden;
}
.sts.over { background: linear-gradient(135deg, var(--orange) 0%, var(--red) 100%); }
.sts .sts-eyebrow {
  font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  opacity: 0.85; margin-bottom: 4px;
}
.sts .sts-big {
  font-family: var(--font-num); font-size: 38px; font-weight: 700;
  letter-spacing: -0.025em; line-height: 1.1; margin-bottom: 4px;
}
.sts .sts-sub {
  font-size: 13px; opacity: 0.92; line-height: 1.4;
}
.sts .sts-meta {
  margin-top: 12px; padding-top: 12px;
  border-top: 0.5px solid rgba(255,255,255,0.22);
  display: flex; gap: 18px; font-size: 11px; opacity: 0.92; font-weight: 600;
}
.sts .sts-meta div span { opacity: 0.7; font-weight: 500; }

/* Goal hierarchy chain */
.goal-chain {
  display: flex; align-items: center; flex-wrap: wrap; gap: 4px;
  font-size: 11px; color: var(--t3); margin-bottom: 6px;
  font-weight: 600; letter-spacing: 0.02em;
}
.goal-chain .crumb {
  background: var(--bg-elev); padding: 3px 8px; border-radius: var(--r-pill);
  border: 0.5px solid var(--sep);
}
.goal-chain .crumb.life { background: color-mix(in srgb, var(--purple) 12%, var(--bg-elev)); color: var(--purple); }
.goal-chain .crumb.short { background: color-mix(in srgb, var(--blue) 12%, var(--bg-elev)); color: var(--blue); }
.goal-chain .crumb.daily { background: color-mix(in srgb, var(--green) 12%, var(--bg-elev)); color: var(--green); }
.goal-chain .arrow { color: var(--t4); font-size: 10px; }

/* Reflection list */
.reflection-card {
  background: var(--card); border-radius: var(--r2); padding: 14px 16px;
  border: 0.5px solid var(--sep); margin-bottom: 8px;
}
.reflection-card .rf-date { font-size: 11px; color: var(--t3); font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 4px; }
.reflection-card .rf-text { font-size: 14px; line-height: 1.55; color: var(--t1); white-space: pre-wrap; }
.reflection-card .rf-actions { margin-top: 8px; display: flex; gap: 8px; }
.reflection-card .rf-actions button {
  font-size: 11px; padding: 4px 10px; border-radius: var(--r-pill);
  background: var(--bg-elev); color: var(--t2); border: 0.5px solid var(--sep);
}

/* Recurring row — slightly visually distinct from spend rows */
.recurring-row .lead { background: color-mix(in srgb, var(--blue) 12%, var(--bg-elev)); border-radius: 50%; }

/* Privacy chip in topbar */
.tb-priv {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--bg-elev); display: inline-flex; align-items: center; justify-content: center;
  font-size: 16px; color: var(--t2); border: 0.5px solid var(--sep); margin-right: 6px;
  transition: transform .15s ease, color .15s ease;
}
.tb-priv:active { transform: scale(.92); }
body.priv-on .tb-priv { color: var(--blue); background: color-mix(in srgb, var(--blue) 14%, var(--bg-elev)); }

/* Floating action button (Quick Add Spend) */
#fab {
  position: fixed;
  right: max(20px, env(safe-area-inset-right));
  bottom: calc(var(--tab-h) + 14px);
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--t1);
  color: var(--bg);
  font-size: 28px; font-weight: 300; line-height: 1;
  box-shadow: var(--sh-pop);
  z-index: 6;
  display: flex; align-items: center; justify-content: center;
  transition: transform .12s ease, background .15s ease;
}
#fab:active { transform: scale(.92); }
#fab:hover { background: var(--blue); color: #fff; }

/* Cashflow chart card */
.cf-card { background: var(--card); border-radius: var(--r); border: 0.5px solid var(--sep); padding: 16px; margin-bottom: 14px; box-shadow: var(--sh-1); }
.cf-card .cf-h { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
.cf-card .cf-h .lbl { font-size: 11px; color: var(--t3); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
.cf-card .cf-h .end { font-family: var(--font-num); font-size: 20px; font-weight: 700; letter-spacing: -0.022em; color: var(--t1); }
.cf-card .cf-h .end.neg { color: var(--red); }
.cf-card .cf-sub { font-size: 12px; color: var(--t3); margin-top: 8px; }

/* Year heatmap */
.heat-wrap { background: var(--card); border-radius: var(--r); border: 0.5px solid var(--sep); padding: 14px 12px; box-shadow: var(--sh-1); overflow-x: auto; }
.heat-wrap .heat-h { font-size: 11px; color: var(--t3); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 0 4px 8px; }
.heat-grid { display: grid; grid-template-rows: repeat(7, 11px); grid-auto-flow: column; gap: 2px; padding: 4px; }
.heat-cell { width: 11px; height: 11px; border-radius: 2px; background: var(--bg-elev); transition: transform .1s ease; }
.heat-cell.l1 { background: color-mix(in srgb, var(--green) 22%, var(--bg-elev)); }
.heat-cell.l2 { background: color-mix(in srgb, var(--green) 45%, var(--bg-elev)); }
.heat-cell.l3 { background: color-mix(in srgb, var(--green) 70%, var(--bg-elev)); }
.heat-cell.l4 { background: var(--green); }
.heat-cell:hover { transform: scale(1.4); }

/* Daily action context badge */
.action-context {
  font-size: 10px; color: var(--t3); font-weight: 600; letter-spacing: 0.05em;
  text-transform: uppercase; margin-top: 2px;
}
.action-context .arrow { color: var(--t4); margin: 0 4px; }
.action-context .target { color: var(--blue); }

/* Goal templates */
.tpl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0 14px; }
.tpl-card {
  background: var(--bg-elev); border: 1.5px solid transparent; border-radius: var(--r2);
  padding: 14px 12px; cursor: pointer; user-select: none;
  display: flex; flex-direction: column; gap: 4px; min-height: 110px;
  transition: border-color .12s, transform .1s;
}
.tpl-card:active { transform: scale(.98); }
.tpl-card:hover { border-color: var(--blue); }
.tpl-card .tpl-emoji { font-size: 24px; margin-bottom: 4px; }
.tpl-card .tpl-title { font-size: 13px; font-weight: 700; color: var(--t1); line-height: 1.25; }
.tpl-card .tpl-sub { font-size: 11px; color: var(--t3); line-height: 1.3; }

/* Weekly review banner */
.wr-banner {
  background: linear-gradient(135deg, var(--purple), var(--indigo));
  color: #fff; border-radius: var(--r); padding: 14px 16px; margin-bottom: 12px;
  display: flex; gap: 12px; align-items: center;
  box-shadow: var(--sh-2);
}
.wr-banner .wr-emoji { font-size: 24px; }
.wr-banner .wr-body { flex: 1; }
.wr-banner .wr-t1 { font-size: 14px; font-weight: 700; }
.wr-banner .wr-t2 { font-size: 12px; opacity: 0.88; margin-top: 2px; }
.wr-banner .wr-cta { background: rgba(255,255,255,.18); color: #fff; padding: 6px 12px; border-radius: var(--r-pill); font-size: 12px; font-weight: 600; }

</style>
</head>
<body>

<div id="app">
  <div id="topbar">
    <div class="tb-greet">
      <div class="tb-hello" id="tb-hello">Good morning</div>
      <div class="tb-name"  id="tb-title">Ascend</div>
    </div>
    <div style="display:flex;align-items:center">
      <button class="tb-priv" id="tb-priv" title="Privacy mode" onclick="togglePrivacyMode()" aria-label="Privacy mode">👁</button>
      <button class="tb-btn" id="tb-action" title="Settings" onclick="openSettings()">⚙︎</button>
    </div>
  </div>

  <div id="content">
    <div class="page active" id="page-today"></div>
    <div class="page" id="page-goals"></div>
    <div class="page" id="page-money"></div>
    <div class="page" id="page-stats"></div>
    <div class="page" id="page-settings"></div>
  </div>

  <nav id="tabbar">
    <button class="tab active" data-tab="today"><span class="ic">☀︎</span><span>Today</span></button>
    <button class="tab" data-tab="goals"><span class="ic">◎</span><span>Goals</span></button>
    <button class="tab" data-tab="money"><span class="ic">$</span><span>Money</span></button>
    <button class="tab" data-tab="stats"><span class="ic">▦</span><span>Stats</span></button>
  </nav>

  <button id="fab" aria-label="Quick add spend" onclick="quickAddSpendSheet()">+</button>
</div>

<div class="scrim" id="scrim" onclick="closeSheet()"></div>
<div class="sheet" id="sheet"></div>
<div id="toast"></div>

<script>
/* ================ DATA ================ */
const SK = "ascend_v2";

const clone = (o) => (typeof structuredClone === "function") ? structuredClone(o) : JSON.parse(JSON.stringify(o));

function isLockedEnvelope(p) { return p && typeof p === "object" && p.v === 1 && p.iv && p.ct && p.salt; }
function load() {
  try {
    const raw = localStorage.getItem(SK);
    if (!raw) return clone(DEFAULT_DB);
    const p = JSON.parse(raw);
    // If data is encrypted, signal locked state — caller will prompt for passphrase
    if (isLockedEnvelope(p)) return { __locked: true, __salt: p.salt };
    return Object.assign(clone(DEFAULT_DB), p, {
      settings: Object.assign({}, DEFAULT_DB.settings, p.settings || {}),
      budget: Object.assign({}, DEFAULT_DB.budget, p.budget || {}),
      user: Object.assign({}, DEFAULT_DB.user, p.user || {}),
    });
  } catch { return clone(DEFAULT_DB); }
}

/* ================ CRYPTO (passphrase encryption) ================
   Envelope shape: { v:1, salt:base64, iv:base64, ct:base64 }
   Key derivation: PBKDF2(passphrase, salt, 250000, SHA-256) → AES-GCM 256
   Without an in-memory key, save() falls back to plaintext (until user sets a passphrase).
*/
let APP_KEY = null;  // CryptoKey held in memory after unlock

const _b64bytes = (b64) => { const b = atob(b64); const a = new Uint8Array(b.length); for (let i=0;i<b.length;i++) a[i] = b.charCodeAt(i); return a; };
const _bytes64 = (bytes) => { let s = ""; for (let i=0;i<bytes.length;i++) s += String.fromCharCode(bytes[i]); return btoa(s); };

async function deriveKey(passphrase, saltB64) {
  const salt = _b64bytes(saltB64);
  const baseKey = await crypto.subtle.importKey("raw", new TextEncoder().encode(passphrase), { name: "PBKDF2" }, false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 250000, hash: "SHA-256" },
    baseKey,
    { name: "AES-GCM", length: 256 },
    false,
    ["encrypt","decrypt"]
  );
}
async function encryptObject(obj, key) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const data = new TextEncoder().encode(JSON.stringify(obj));
  const ct = new Uint8Array(await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, data));
  return { iv: _bytes64(iv), ct: _bytes64(ct) };
}
async function decryptObject(envelope, key) {
  const iv = _b64bytes(envelope.iv);
  const ct = _b64bytes(envelope.ct);
  const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
  return JSON.parse(new TextDecoder().decode(pt));
}
function newSalt() { return _bytes64(crypto.getRandomValues(new Uint8Array(16))); }
function isEnvelope(o) { return o && typeof o === "object" && o.v === 1 && o.ct && o.iv && o.salt; }

// Wrap save: encrypt if APP_KEY is loaded.
const _origSave = save;
save = async function() {
  try {
    if (APP_KEY && DB.settings.encrypted) {
      const salt = DB.__salt || newSalt();
      DB.__salt = salt;
      const env = await encryptObject(DB, APP_KEY);
      const blob = { v: 1, salt, iv: env.iv, ct: env.ct };
      localStorage.setItem(SK, JSON.stringify(blob));
    } else {
      _origSave();
    }
  } catch (e) { console.error("save failed", e); }
};

// Sync wrapper for inline handlers; fire-and-forget.
function saveNow() { save(); }

async function setPassphrase(pass) {
  if (!pass || pass.length < 4) throw new Error("Passphrase too short (min 4)");
  const salt = DB.__salt || newSalt();
  DB.__salt = salt;
  APP_KEY = await deriveKey(pass, salt);
  DB.settings.encrypted = true;
  await save();
}
async function unlockWithPassphrase(pass) {
  const raw = localStorage.getItem(SK);
  if (!raw) throw new Error("No data");
  const blob = JSON.parse(raw);
  if (!isEnvelope(blob)) throw new Error("Data is not encrypted");
  const key = await deriveKey(pass, blob.salt);
  // try decrypt
  const dec = await decryptObject({ iv: blob.iv, ct: blob.ct }, key); // throws if wrong pass
  APP_KEY = key;
  DB = Object.assign(clone(DEFAULT_DB), dec, { __salt: blob.salt });
  return true;
}
async function disablePassphrase() {
  APP_KEY = null;
  DB.settings.encrypted = false;
  delete DB.__salt;
  _origSave();
}

/* ================ BACKEND CLIENT ================
   Auth model:
   - On first call, the device enrolls with the worker by sending the user's apiKey (an
     "enrollment key" they pasted from setup) along with a freshly generated per-device
     clientSecret. The worker stores SHA-256(clientSecret) keyed by userId.
   - All subsequent calls authenticate as `Bearer <userId>:<clientSecret>`. The shared
     enrollment key is never sent again unless the secret is rejected (forced re-enroll).
   - This means a stolen apiKey alone can't impersonate this device; an attacker would
     also need the local clientSecret (which is encrypted along with the rest of DB
     when a passphrase is set).
*/
function newClientSecret() {
  const bytes = crypto.getRandomValues(new Uint8Array(32));
  let hex = ""; for (let i = 0; i < bytes.length; i++) hex += bytes[i].toString(16).padStart(2, "0");
  return hex;
}

function ensureUserId() {
  if (!DB.user.userId) { DB.user.userId = "u_" + uid() + uid(); _origSave(); }
  return DB.user.userId;
}

async function _apiRaw(path, opts = {}) {
  const url = (DB.settings.backendUrl || "").replace(/\/+$/, "") + path;
  const r = await fetch(url, opts);
  const text = await r.text();
  let body; try { body = JSON.parse(text); } catch { body = { raw: text }; }
  if (!r.ok) {
    // If our cached secret was rejected by the worker, drop it so the next call re-enrolls.
    // BUT: the /anthropic/* endpoint passes Anthropic's status code through verbatim, so a
    // bad Anthropic key also returns 401 — we must NOT clear our clientSecret in that case.
    // Worker auth errors return body.error as a string; Anthropic passthroughs are objects.
    const isWorkerAuthFailure = r.status === 401
      && !path.startsWith("/anthropic")
      && typeof body.error === "string";
    if (isWorkerAuthFailure && DB.user.clientSecret) {
      DB.user.clientSecret = "";
      try { await save(); } catch {}
    }
    const errMsg = (typeof body.error === "string"
      ? body.error
      : body.error && body.error.message) || `HTTP ${r.status}`;
    throw new Error(errMsg);
  }
  return body;
}

async function _enrollDevice() {
  if (!DB.settings.apiKey) throw new Error("Backend API key not configured (paste your enrollment key in Settings)");
  const userId = ensureUserId();
  const secret = newClientSecret();
  await _apiRaw("/enroll", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + DB.settings.apiKey,
      "Content-Type": "application/json",
    },
    body: JSON.stringify({ userId, clientSecret: secret }),
  });
  DB.user.clientSecret = secret;
  // Enrollment succeeded — clear the operator's long-lived enrollment key from
  // local storage. From here on, this device authenticates with its own
  // per-device clientSecret. If the device ever needs to re-enroll (e.g. KV
  // reset), the user pastes the enrollment key again in Settings.
  DB.settings.apiKey = "";
  await save();
  return secret;
}

// Coalesce concurrent enrollment attempts so two simultaneous api() calls
// (e.g. auto-sync on open + user-tapped Connect bank) share the same enrollment
// instead of each minting their own secret and racing on the server.
let _enrollInFlight = null;
function _ensureEnrolled() {
  if (DB.user.clientSecret) return Promise.resolve();
  if (_enrollInFlight) return _enrollInFlight;
  _enrollInFlight = _enrollDevice().finally(() => { _enrollInFlight = null; });
  return _enrollInFlight;
}

async function api(path, opts = {}) {
  if (!DB.settings.backendUrl) throw new Error("Backend URL not configured");
  ensureUserId();
  if (!DB.user.clientSecret) await _ensureEnrolled();
  const headers = Object.assign({
    "Authorization": "Bearer " + DB.user.userId + ":" + DB.user.clientSecret,
    "Content-Type": "application/json",
  }, opts.headers || {});
  try {
    return await _apiRaw(path, Object.assign({}, opts, { headers }));
  } catch (e) {
    // _apiRaw clears clientSecret on 401; retry once to silently re-enroll.
    if (!DB.user.clientSecret && DB.settings.apiKey) {
      await _ensureEnrolled();
      const headers2 = Object.assign({
        "Authorization": "Bearer " + DB.user.userId + ":" + DB.user.clientSecret,
        "Content-Type": "application/json",
      }, opts.headers || {});
      return await _apiRaw(path, Object.assign({}, opts, { headers: headers2 }));
    }
    throw e;
  }
}

async function backendExchange(public_token, institution_name) {
  return api("/exchange", { method: "POST", body: JSON.stringify({
    userId: ensureUserId(),
    public_token,
    institution_name: institution_name || "Bank",
  })});

async function backendSync() {
  const r = await api("/sync", { method: "POST", body: JSON.stringify({ userId: ensureUserId() }) });
  // Merge accounts (replace fully — they're a snapshot)
  DB.accounts = r.accounts || [];
  snapshotNetWorth();
  // Merge transactions: any plaid_id we already have, skip; else add
  const existing = new Set(DB.spend.filter(t => t.source === "plaid").map(t => t.plaid_id));
  let added = 0;
  for (const tx of r.transactions || []) {
    if (existing.has(tx.transaction_id)) continue;
    DB.spend.unshift({
      id: uid(),
      date: tx.date,
      category: (tx.category || "Other"),
      amount: tx.amount,        // positive = outflow per Plaid
      note: tx.merchant_name || tx.name || "",
      source: "plaid",
      plaid_id: tx.transaction_id,
      account_id: tx.account_id,
      pending: !!tx.pending,
    });
    added++;
  }
  // apply user rules to newly imported plaid transactions
  applyRulesToAll();
  // detect income / paychecks for review
  processSyncedDeposits();
  await save();
  return { added, accounts: DB.accounts.length };
}

/* Open Plaid Link — calls backend for link_token, then launches the SDK */
async function connectBank() {
  if (!window.Plaid) { toast("Plaid Link still loading — try again"); return; }
  if (!_backendReady()) {
    toast("Set backend URL + Enrollment Key in Settings first");
    showTab("settings");
    return;
  }
  toast("Opening bank connect…");
  let lt;
  try { lt = await backendLinkToken(); }
  catch (e) { toast("Link token error: " + e.message); return; }

  const handler = window.Plaid.create({
    token: lt.link_token,
    onSuccess: async (public_token, metadata) => {
      try {
        await backendExchange(public_token, metadata?.institution?.name || "Bank");
        toast("Connected — syncing…");
        const s = await backendSync();
        toast(`Synced ${s.added} new transactions`);
        render();
      } catch (e) { toast("Exchange failed: " + e.message); }
    },
    onExit: (err) => { if (err) toast("Plaid: " + (err.error_message || err.error_code || "exit")); },
  });
  handler.open();
}

/* ================ HABITS ================ */
function streakOf(h) {
  let n = 0;
  let d = new Date();
  // walk back; allow today to be missing without breaking streak
  let started = false;
  for (let i=0; i<400; i++) {
    const k = todayKey(d);
    const hit = !!h.log[k] && (h.type === "count" ? h.log[k] >= (h.target||1) : !!h.log[k]);
    if (i === 0 && !hit) { d.setDate(d.getDate()-1); continue; }
    if (hit) { n++; started = true; d.setDate(d.getDate()-1); }
    else { break; }
  }
  return n;
}
function habitDoneToday(h) {
  const v = h.log[todayKey()];
  if (h.type === "count") return (v||0) >= (h.target||1);
  return !!v;
}
function todayHabitProgress() {
  if (!DB.habits.length) return { done: 0, total: 0, pct: 0 };
  const done = DB.habits.filter(habitDoneToday).length;
  return { done, total: DB.habits.length, pct: Math.round(100*done/DB.habits.length) };
}

function toggleHabit(id) {
  const h = DB.habits.find(x => x.id === id);
  if (!h) return;
  const k = todayKey();
  if (h.type === "count") {
    h.log[k] = (h.log[k]||0) + 1;
    if (h.log[k] >= (h.target||1) && !h._wasDone) toast(`✓ ${h.name}`);
    h._wasDone = h.log[k] >= (h.target||1);
  } else {
    h.log[k] = !h.log[k];
    if (h.log[k]) toast(`✓ ${h.name}`);
  }
  save(); render();
}
function setHabitCount(id, val) {
  const h = DB.habits.find(x => x.id === id); if (!h) return;
  const k = todayKey();
  const v = Math.max(0, Number(val)||0);
  if (v) h.log[k] = v; else delete h.log[k];
  save(); render();
}
function deleteHabit(id) {
  DB.habits = DB.habits.filter(h => h.id !== id);
  save(); render();
}

/* ================ GOALS ================ */
const TIERS = [
  { id: "daily", label: "Daily" },
  { id: "short", label: "Short-term" },
  { id: "life",  label: "Life" },
];
var activeTier = "daily";

function goalProgress(g) {
  if (g.done) return 100;
  if (!g.steps?.length) return 0;
  const d = g.steps.filter(s => s.done).length;
  return Math.round(100 * d / g.steps.length);
}
function toggleGoal(id) {
  const g = DB.goals.find(x => x.id === id); if (!g) return;
  g.done = !g.done;
  g.completedAt = g.done ? Date.now() : null;
  if (g.done) toast("✓ Goal complete");
  save(); render();
}
function toggleStep(gid, sid) {
  const g = DB.goals.find(x => x.id === gid); if (!g) return;
  const s = g.steps.find(x => x.id === sid); if (!s) return;
  s.done = !s.done;
  if (g.steps.every(x => x.done)) { g.done = true; g.completedAt = Date.now(); toast("✓ Goal complete"); }
  else { g.done = false; g.completedAt = null; }
  save(); render();
}
function deleteGoal(id) {
  DB.goals = DB.goals.filter(g => g.id !== id);
  save(); render();
}
function addStepInline(gid) {
  const text = prompt("New step");
  if (!text || !text.trim()) return;
  const g = DB.goals.find(x => x.id === gid); if (!g) return;
  g.steps.push({ id: uid(), text: text.trim(), done: false });
  save(); render();
}
function deleteStep(gid, sid) {
  const g = DB.goals.find(x => x.id === gid); if (!g) return;
  g.steps = g.steps.filter(s => s.id !== sid);
  save(); render();
}

    <label>Tier</label>
    <select id="g-tier">
      ${TIERS.map(t=>`<option value="${t.id}" ${t.id===g.tier?'selected':''}>${t.label}</option>`).join("")}

      <div style="margin-top:6px">
        <button class="btn secondary" style="width:100%;font-size:13px" onclick="closeSheet();pickGoalParentSheet(${jsAttr(g.id)})">${g.parentId ? "🔗 Linked to a bigger goal" : "🔗 Link to a bigger goal"}</button>
      </div>` : ""}
    <div class="actions">

      <button class="btn secondary" onclick="closeSheet()">Cancel</button>
      <button class="btn" id="g-save">${isEdit?'Save':'Add'}</button>
    </div>
  `);
  $("#g-save").addEventListener("click", async () => {
    const title = $("#g-title").value.trim();
    if (!title) { toast("Add a title"); return; }
    const note = $("#g-note").value.trim();
    const tier = $("#g-tier").value;

function monthSpend() {
  const now = new Date(), y = now.getFullYear(), m = now.getMonth();
  return DB.spend.filter(t => {
    const d = new Date(t.date+"T00:00:00");
    return d.getFullYear() === y && d.getMonth() === m;
  }).reduce((a,t)=>a+(+t.amount||0), 0);
}
function spendCategories() {
  const cats = new Set(["Food","Gas","Groceries","Bills","Shopping","Fun","Other"]);
  DB.budget.expenses.forEach(e => cats.add(e.name));
  return Array.from(cats);
}

var moneySub = "savings";
var wealthRange = "90"; // "30" | "90" | "365" | "all" — controls net-worth chart window

// Net-worth composition for the Wealth dashboard. Computes how much wealth lives
// in each major bucket so we can show a stacked-bar breakdown.
function wealthComposition() {
  let cash = 0, investments = 0, realAssets = 0, debts = 0;
  // Plaid accounts
  for (const a of (DB.accounts || [])) {
    const bal = +a.balance_current || 0;
    if (a.type === "depository") cash += bal;
    else if (a.type === "investment" || a.type === "brokerage") investments += bal;
    else if (a.type === "credit" || a.type === "loan") debts += bal;
  }
  // Manual assets — bucketed by type
  for (const a of (DB.assets || [])) {
    const v = +a.value || 0;
    if (a.type === "cash") cash += v;
    else if (a.type === "investment" || a.type === "crypto") investments += v;
    else realAssets += v;
  }
  // Manual liabilities all roll into debts
  for (const l of (DB.liabilities || [])) {
    debts += +l.balance || 0;
  }
  const total = cash + investments + realAssets - debts;
  return { cash, investments, realAssets, debts, total };
}

function setWealthRange(r) { wealthRange = r; renderMoney(); }

function filteredNwHistory() {
  const days = wealthRange === "30" ? 30 : wealthRange === "90" ? 90 : wealthRange === "365" ? 365 : Infinity;
  const hist = DB.netWorthHistory || [];
  if (days === Infinity) return hist;
  const cutoff = Date.now() - days * 86400000;
  return hist.filter(s => new Date(s.date + "T00:00:00").getTime() >= cutoff);
}

// Days since the latest net-worth snapshot (or null if no history)
function _nwLastSnapshotAge() {
  const hist = DB.netWorthHistory || [];
  if (!hist.length) return null;
  return Math.floor((Date.now() - new Date(hist[hist.length-1].date + "T00:00:00").getTime()) / 86400000);
}

/* ===== STATS ===== */
function renderStats() {
  // Zero-state: nothing to show yet — give a friendly nudge instead of empty zeros
  if (!DB.habits.length && !(DB.spend||[]).length && !(DB.savings||[]).length && !(DB.goals||[]).length) {
    $("#page-stats").innerHTML = `
      <div class="lg-title">Stats</div>
      <div class="empty" style="padding:30px 18px;background:var(--card);border-radius:var(--r);margin-top:14px">
        <div class="e-emoji">📊</div>
        <div class="e-title">Stats fill in as you use the app</div>
        <div class="e-sub">Check off a habit, log a transaction, set a savings goal — your patterns show up here.</div>
        <button class="btn" style="margin-top:14px;max-width:240px" onclick="showTab('today')">Go to Today</button>
      </div>
    `;
    return;
  }
  // 8-week heatmap, all habits combined
  const weeks = 12;
  const cols = [];
  const today = new Date();
  // Anchor to Monday
  const start = new Date(today);
  start.setDate(today.getDate() - ((today.getDay()+6)%7) - (weeks-1)*7);
  for (let w=0; w<weeks; w++) {
    const cells = [];
    for (let d=0; d<7; d++) {
      const dt = new Date(start); dt.setDate(start.getDate() + w*7 + d);
      if (dt > today) { cells.push(null); continue; }
      const k = todayKey(dt);
      if (!DB.habits.length) { cells.push(0); continue; }
      const done = DB.habits.filter(h => h.type==="count" ? (h.log[k]||0) >= (h.target||1) : !!h.log[k]).length;
      cells.push(Math.round(100*done/DB.habits.length));
    }
    cols.push(cells);
  }
  const cellClass = (v) => v == null ? "" : v >= 100 ? "l4" : v >= 75 ? "l3" : v >= 50 ? "l2" : v >= 25 ? "l1" : "";

  const topStreaks = DB.habits.map(h => ({ h, s: streakOf(h) })).sort((a,b)=>b.s-a.s).slice(0,5);

    ${(() => {

          </div>
        </div>

    })()}

    ${(() => {
      const months = cashFlowMonths(12);
      if (!months.some(m => m.income || m.expense)) return "";
      const totalIn  = months.reduce((s,m)=>s+m.income, 0);
      const totalOut = months.reduce((s,m)=>s+m.expense, 0);
      return `
        <div class="card" style="background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">

          </div>
          ${cashFlowSvg(months)}
        </div>
      `;
    })()}

    ${(() => {
      const projections = (DB.savings||[]).map(s => ({ s, p: timeToGoal(s.id) })).filter(x => x.p);

      return `

    })()}

    ${(() => {

      return `

    <div class="kpi-grid">

      <div class="section-h"><span class="lbl">Past year</span></div>

          </div></div>
        `;
      })()}
    </div>
  `;

function openSettings() { showTab("settings"); }

async function toggleNotifications(on) {
  if (on) {
    if (!("Notification" in window)) { toast("Notifications not supported"); render(); return; }
    const perm = await Notification.requestPermission();
    if (perm !== "granted") { toast("Permission denied"); DB.settings.notifications = false; save(); render(); return; }
    DB.settings.notifications = true; save(); scheduleReminder(); toast("Reminders on");
  } else {
    DB.settings.notifications = false; save();
  }
  render();
}

let reminderTimer;
function scheduleReminder() {
  if (reminderTimer) clearTimeout(reminderTimer);
  if (!DB.settings.notifications) return;
  const [h,m] = DB.settings.reminderTime.split(":").map(Number);
  const now = new Date();
  const next = new Date(); next.setHours(h, m, 0, 0);
  if (next <= now) next.setDate(next.getDate()+1);
  reminderTimer = setTimeout(() => {
    if (DB.settings.notifications && Notification.permission === "granted") {
      const p = todayHabitProgress();
      const body = p.total ? `${p.done} of ${p.total} habits today. Let's keep going.` : "Open Ascend to plan your day.";
      try { new Notification("Ascend", { body, icon: "icon-180.png" }); } catch {}
    }
    scheduleReminder();
  }, next - now);
}

function exportData() {
  const blob = new Blob([JSON.stringify(DB, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `ascend-backup-${todayKey()}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast("Backup downloaded");
}
function importData() {
  const inp = document.createElement("input"); inp.type = "file"; inp.accept = "application/json";
  inp.onchange = async () => {
    const f = inp.files[0]; if (!f) return;
    try {
      const txt = await f.text();
      const obj = JSON.parse(txt);
      if (!obj || typeof obj !== "object") throw new Error("bad file");
      // Confirm before clobbering — this overwrites the entire DB.
      if (!confirm("This will REPLACE all your current data with the contents of '" + f.name + "'.\n\nA backup of your current data will download first. Continue?")) {
        return;
      }
      // Auto-download a backup of current state before replacing.
      try {
        const cur = JSON.stringify(DB, null, 2);
        const url = URL.createObjectURL(new Blob([cur], { type: "application/json" }));
        const a = document.createElement("a");
        a.href = url; a.download = `ascend-pre-import-${todayKey()}.json`;
        document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(url);
      } catch (e) { /* don't block import on backup failure */ }
      // Build merged DB: start from DEFAULT_DB, then deep-merge settings/user/budget so
      // partial imports don't wipe sibling fields. Top-level arrays/objects are replaced wholesale.
      const fresh = clone(DEFAULT_DB);
      const merged = Object.assign(fresh, obj);
      if (obj.settings && typeof obj.settings === "object") merged.settings = Object.assign({}, fresh.settings, obj.settings);
      if (obj.user     && typeof obj.user     === "object") merged.user     = Object.assign({}, fresh.user, obj.user);
      if (obj.budget   && typeof obj.budget   === "object") merged.budget   = Object.assign({}, fresh.budget, obj.budget);
      DB = merged;
      await save(); applyTheme(); render(); toast("Imported");
    } catch (e) { alert("Could not import: "+e.message); }
  };
  inp.click();
}

/* ================ CATEGORY RULES ================ */
function applyRules(tx) {
  if (!DB.categoryRules || !DB.categoryRules.length) return tx;
  for (const r of DB.categoryRules) {
    if (!r.pattern) continue;
    const field = r.field || "note";
    let val;
    if (field === "note") val = tx.note || "";
    else if (field === "category") val = tx.category || "";
    else if (field === "name") val = (tx.note || tx.category || "");
    else val = "";
    const hay = r.caseSensitive ? val : val.toLowerCase();
    const needle = r.caseSensitive ? r.pattern : r.pattern.toLowerCase();
    if (hay.includes(needle)) {
      tx.category = r.category;
      tx._ruleId = r.id;
      break; // first match wins
    }
  }
  return tx;
}
function applyRulesToAll() {
  let touched = 0;
  for (const tx of (DB.spend || [])) {
    if (tx.source !== "plaid") continue; // don't reclassify manual entries
    const before = tx.category;
    applyRules(tx);
    if (tx.category !== before) touched++;
  }
  return touched;
}
function addCategoryRule(rule) {
  if (!DB.categoryRules) DB.categoryRules = [];
  DB.categoryRules.push(Object.assign({ id: uid(), field: "note" }, rule));
  applyRulesToAll(); save(); render();
}
function deleteCategoryRule(id) {
  DB.categoryRules = (DB.categoryRules || []).filter(r => r.id !== id);
  // Scrub stale references from any transactions tagged by this rule so the
  // "rule" badge doesn't point to a deleted rule.
  for (const t of (DB.spend || [])) {
    if (t._ruleId === id) delete t._ruleId;
  }
  save(); render();
}

/* ================ UPCOMING BILLS ================ */
// Compute the next occurrence of a user-managed recurring item.
// - monthly: next dayOfMonth (clamped to 28 to dodge Feb edge cases)
// - yearly:  same month/day as createdAt, next year if past
// - weekly/biweekly: step forward from createdAt by 7/14d until >= today
function nextRecurringDate(r) {
  const today = new Date();
  const todayStart = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  if (r.cadence === "monthly") {
    const day = Math.max(1, Math.min(28, +r.dayOfMonth || 1));
    const d = new Date(today.getFullYear(), today.getMonth(), day);
    if (d < todayStart) d.setMonth(d.getMonth() + 1);
    return d;
  }
  if (r.cadence === "yearly") {
    const ref = new Date(r.createdAt || Date.now());
    const d = new Date(today.getFullYear(), ref.getMonth(), ref.getDate());
    if (d < todayStart) d.setFullYear(d.getFullYear() + 1);
    return d;
  }
  // weekly / biweekly: step from createdAt
  const interval = r.cadence === "biweekly" ? 14 : 7;
  let d = new Date(r.createdAt || Date.now());
  d = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  while (d < todayStart) d.setDate(d.getDate() + interval);
  return d;
}

function upcomingBills(daysAhead = 7) {
  const today = new Date();
  const todayStart = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const out = [];

  // 1) Plaid-detected subscriptions (active only)
  const subs = detectSubscriptions().filter(s => s.status === "active");
  for (const s of subs) {
    const next = new Date(s.next_predicted + "T00:00:00");
    const days = Math.round((next - today) / 86400000);
    if (days < -1 || days > daysAhead) continue;
    if ((DB.dismissedBills || {})[`${s.key}:${s.next_predicted}`]) continue;
    out.push({
      source: "plaid",
      key: s.key,
      merchant: s.merchant,
      amount: s.avg_amount,
      next_predicted: s.next_predicted,
      days,
    });
  }

  // 2) User-managed recurring expenses (income excluded — "Coming up" is bills).
  // Dismissal key shape mirrors Plaid's: dismissBill(key, date) writes `${key}:${date}`.
  // We prefix recurring keys with "r:<id>" to avoid colliding with Plaid merchant keys.
  for (const r of (DB.recurring || [])) {
    if (r.kind === "income") continue;
    const nextDate = nextRecurringDate(r);
    const days = Math.round((nextDate - todayStart) / 86400000);
    if (days < 0 || days > daysAhead) continue;
    const iso = todayKey(nextDate);
    const recKey = `r:${r.id}`;
    if ((DB.dismissedBills || {})[`${recKey}:${iso}`]) continue;
    out.push({
      source: "recurring",
      key: recKey,
      merchant: r.name,
      amount: +r.amount || 0,
      next_predicted: iso,
      days,
    });
  }

  return out.sort((a,b) => a.days - b.days);
}
function dismissBill(key, date) {
  if (!DB.dismissedBills) DB.dismissedBills = {};
  DB.dismissedBills[`${key}:${date}`] = true;
  save(); render();
}

/* ================ PAYCHECK / INCOME ================ */
// In Plaid, deposits show as negative amount. We treat amount < -paycheckMin as a paycheck.
function detectIncomeFor(tx) {
  if (tx.source !== "plaid") return false;
  const min = +DB.settings.paycheckMin || 500;
  return (+tx.amount) <= -min;
}
function suggestSplitFor(amount) {
  // amount: positive dollars (we store amount<0 in plaid; here we pass abs)
  const allocs = (DB.allocations || []).filter(a => +a.percent > 0);
  if (!allocs.length) return [];
  const totalPct = allocs.reduce((s,a)=>s+(+a.percent||0),0);
  return allocs.map(a => {
    const sav = (DB.savings||[]).find(s => s.id === a.savingId);
    return {
      savingId: a.savingId,
      label: a.label || sav?.name || "?",
      percent: a.percent,
      amount: Math.round((amount * a.percent / Math.max(totalPct, 100)) * 100) / 100,
    };
  });
}
function reviewIncomeSheet(deposit) {
  const splits = suggestSplitFor(deposit.amount);
  const totalSuggested = splits.reduce((s,x)=>s+x.amount,0);
  const remaining = deposit.amount - totalSuggested;
  openSheet(`
    <h2>Paycheck detected 💸</h2>
    <p class="muted" style="margin-bottom:6px;font-size:13px">${esc(deposit.note||"Deposit")} on ${esc(deposit.date)}</p>
    <div style="font-size:30px;font-weight:700;letter-spacing:-.4px;margin-bottom:14px;color:var(--green)">+${fmt$0(deposit.amount)}</div>
    ${splits.length ? `
      <label>Suggested allocation</label>
      <div class="list" style="margin-bottom:10px">
        ${splits.map(s => `
          <div class="row">
            <div class="lead">💰</div>
            <div class="body"><div class="t1">${esc(s.label)}</div><div class="t2">${s.percent}% of paycheck</div></div>
            <div class="trail" style="font-weight:600">${fmt$0(s.amount)}</div>
          </div>
        `).join("")}
        <div class="row"><div class="lead">💵</div><div class="body"><div class="t1">Stays in checking</div><div class="t2">After allocations</div></div><div class="trail" style="font-weight:600">${fmt$0(remaining)}</div></div>
      </div>
      <div class="actions">
        <button class="btn secondary" onclick="dismissPendingDeposit(${jsAttr(deposit.plaid_id)});closeSheet()">Skip</button>
        <button class="btn" id="dep-confirm">Apply allocations</button>
      </div>
    ` : `
      <p class="muted" style="font-size:13px">No allocation rules yet. Set them in Settings → Paycheck allocations.</p>
      <div class="actions">
        <button class="btn secondary" onclick="dismissPendingDeposit(${jsAttr(deposit.plaid_id)});closeSheet()">Got it</button>
        <button class="btn" onclick="dismissPendingDeposit(${jsAttr(deposit.plaid_id)});closeSheet();showTab('settings')">Set up rules</button>
      </div>
    `}
  `);
  if (splits.length) {
    $("#dep-confirm").addEventListener("click", () => {
      // Apply each split to the savings goal's current balance
      for (const s of splits) {
        const sav = DB.savings.find(x => x.id === s.savingId);
        if (!sav) continue;
        sav.current = (+sav.current||0) + s.amount;
        sav.log = sav.log || [];
        sav.log.push({ date: deposit.date, amount: s.amount, note: `Auto-allocated from ${deposit.note||"paycheck"}` });
      }
      dismissPendingDeposit(deposit.plaid_id);
      closeSheet();
      toast(`Allocated ${fmt$0(totalSuggested)}`);
    });
  }
}
function dismissPendingDeposit(plaidId) {
  DB.pendingDeposits = (DB.pendingDeposits||[]).filter(d => d.plaid_id !== plaidId);
  // Persist the dismissal so the next sync doesn't re-surface the same paycheck.
  // processSyncedDeposits() reads this set to skip already-handled deposits.
  DB.dismissedDeposits = DB.dismissedDeposits || [];
  if (!DB.dismissedDeposits.includes(plaidId)) DB.dismissedDeposits.push(plaidId);
  // Cap the list so it doesn't grow forever — keep the most recent 500 dismissals.
  if (DB.dismissedDeposits.length > 500) DB.dismissedDeposits = DB.dismissedDeposits.slice(-500);
  save(); render();
}
function processSyncedDeposits() {
  // Find new plaid txs that look like income
  const plaidTxs = (DB.spend||[]).filter(detectIncomeFor);
  const seen = new Set((DB.pendingDeposits||[]).map(d => d.plaid_id));
  const handled = new Set((DB.dismissedDeposits||[]));
  for (const tx of plaidTxs) {
    if (seen.has(tx.plaid_id) || handled.has(tx.plaid_id)) continue;
    // Skip if older than 14 days (probably already handled in a previous session)
    const ageDays = (Date.now() - new Date(tx.date).getTime()) / 86400000;
    if (ageDays > 14) continue;
    DB.pendingDeposits = DB.pendingDeposits || [];
    DB.pendingDeposits.push({
      plaid_id: tx.plaid_id,
      amount: Math.abs(+tx.amount),
      date: tx.date,
      note: tx.note,
    });
  }
  save();
}

function donutSvg(slices, size = 160, hole = 0.55) {
  const total = slices.reduce((a,s)=>a+s.value,0);
  if (!total) return "";
  const cx = size/2, cy = size/2, r = size/2 - 4, ri = r * hole;
  let acc = 0;
  const arcs = slices.map((s, i) => {
    const start = acc / total * Math.PI * 2 - Math.PI/2;
    acc += s.value;
    const end   = acc / total * Math.PI * 2 - Math.PI/2;
    const large = (end - start) > Math.PI ? 1 : 0;
    const x1 = cx + r  * Math.cos(start), y1 = cy + r  * Math.sin(start);
    const x2 = cx + r  * Math.cos(end),   y2 = cy + r  * Math.sin(end);
    const xi1 = cx + ri * Math.cos(end),  yi1 = cy + ri * Math.sin(end);
    const xi2 = cx + ri * Math.cos(start),yi2 = cy + ri * Math.sin(start);
    return `<path d="M${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r} 0 ${large} 1 ${x2.toFixed(2)},${y2.toFixed(2)} L${xi1.toFixed(2)},${yi1.toFixed(2)} A${ri},${ri} 0 ${large} 0 ${xi2.toFixed(2)},${yi2.toFixed(2)} Z" fill="${s.color}"/>`;
  }).join("");
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">${arcs}</svg>`;
}

function cashFlowMonths(n = 12) {
  const out = [];
  const today = new Date();
  for (let i = n - 1; i >= 0; i--) {
    const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    let income = 0, expense = 0;
    for (const t of (DB.spend || [])) {
      if (!t.date.startsWith(key)) continue;
      const amt = +t.amount || 0;
      if (amt < 0) income += -amt;
      else expense += amt;
    }
    out.push({ key, label: d.toLocaleDateString("en-US", { month: "short" }), income, expense, net: income - expense });
  }
  return out;
}
function cashFlowSvg(months, w = 320, h = 140) {
  const all = months.flatMap(m => [m.income, m.expense]);
  const max = Math.max(...all, 1);
  const barW = (w - 30) / months.length;
  const padX = 8;
  let bars = "";
  months.forEach((m, i) => {
    const x = padX + i * barW;
    const incH = (m.income / max) * (h - 24);
    const expH = (m.expense / max) * (h - 24);
    bars += `<rect x="${(x+1).toFixed(1)}" y="${(h-24-incH).toFixed(1)}" width="${(barW/2-2).toFixed(1)}" height="${incH.toFixed(1)}" fill="#34C759" rx="1"/>`;
    bars += `<rect x="${(x+barW/2).toFixed(1)}" y="${(h-24-expH).toFixed(1)}" width="${(barW/2-2).toFixed(1)}" height="${expH.toFixed(1)}" fill="#FF3B30" rx="1"/>`;
    bars += `<text x="${(x+barW/2-1).toFixed(1)}" y="${(h-8).toFixed(1)}" font-size="9" fill="var(--t3)" text-anchor="middle">${m.label}</text>`;
  });
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" style="display:block">${bars}</svg>`;
}

function timeToGoal(savingId) {
  // Estimate when a savings goal will be hit based on average monthly contribution from log over last 6 months
  const sav = (DB.savings || []).find(s => s.id === savingId);
  if (!sav || !sav.target || sav.current >= sav.target) return null;
  const log = (sav.log || []).slice();
  if (log.length < 2) return null;
  const now = new Date();
  const sixMonthsAgo = new Date(now.getFullYear(), now.getMonth() - 6, 1);
  const recent = log.filter(l => new Date(l.date) >= sixMonthsAgo);
  if (recent.length < 2) return null;
  const total = recent.reduce((a,l) => a + (+l.amount||0), 0);
  if (total <= 0) return null;
  const monthsObserved = Math.max(1, (now - new Date(recent[0].date)) / (1000*60*60*24*30));
  const monthlyRate = total / monthsObserved;
  const remaining = sav.target - sav.current;
  const monthsToGo = remaining / monthlyRate;
  if (!isFinite(monthsToGo) || monthsToGo > 600) return null;
  const reachDate = new Date(now);
  reachDate.setMonth(reachDate.getMonth() + Math.ceil(monthsToGo));
  return {
    monthlyRate,
    monthsToGo: Math.ceil(monthsToGo),
    reachDate: reachDate.toLocaleDateString("en-US", { month: "long", year: "numeric" }),
  };
}

/* ================ DEBT PAYOFF ================ */
function debtAccounts() {
  // Plaid credit + loan accounts
  const plaid = (DB.accounts || [])
    .filter(a => a.type === "credit" || a.type === "loan")
    .filter(a => (+a.balance_current||0) > 0)
    .map(a => {
      const meta = (DB.debtMeta || {})[a.account_id] || {};
      return Object.assign({}, a, {
        _source: "plaid",
        apr: +meta.apr || 0,
        minPayment: +meta.minPayment || Math.max(25, Math.round((+a.balance_current||0) * 0.02)),
      });
    });
  // Manual liabilities
  const manual = (DB.liabilities || [])
    .filter(l => (+l.balance||0) > 0)
    .map(l => ({
      _source: "manual",
      account_id: l.id,
      name: l.name,
      type: l.type === "auto" ? "loan" : (l.type === "mortgage" ? "loan" : (l.type === "credit" ? "credit" : "loan")),
      subtype: l.type,
      balance_current: +l.balance,
      mask: "",
      apr: +l.apr || 0,
      minPayment: +l.minPayment || Math.max(25, Math.round((+l.balance||0) * 0.02)),
    }));
  return plaid.concat(manual);
}
function setDebtMeta(accountId, apr, minPayment) {
  if (!DB.debtMeta) DB.debtMeta = {};
  DB.debtMeta[accountId] = { apr: +apr || 0, minPayment: +minPayment || 0 };
  save(); render();
}
function payoffSchedule(strategy = "avalanche", extra = 0) {
  let debts = debtAccounts().map(d => ({ ...d, balance: +d.balance_current||0 }));
  if (!debts.length) return null;
  // Sort: avalanche = APR desc, snowball = balance asc
  if (strategy === "avalanche") debts.sort((a,b) => b.apr - a.apr);
  else                          debts.sort((a,b) => a.balance - b.balance);
  let totalInterest = 0;
  let months = 0;
  let extraLeft = extra;
  const totalMin = debts.reduce((s,d)=>s+d.minPayment, 0);
  while (debts.some(d => d.balance > 0) && months < 600) {
    months++;
    let pool = totalMin + extra;
    for (const d of debts) {
      if (d.balance <= 0) continue;
      // Add monthly interest
      const interest = d.balance * (d.apr / 100 / 12);
      d.balance += interest;
      totalInterest += interest;
      // Pay min first
      const pay = Math.min(d.minPayment, d.balance);
      d.balance -= pay;
      pool -= pay;
    }
    // Apply extra to first non-zero debt by strategy order
    for (const d of debts) {
      if (d.balance <= 0 || pool <= 0) continue;
      const pay = Math.min(pool, d.balance);
      d.balance -= pay;
      pool -= pay;
    }
  }
  return { months, years: (months/12).toFixed(1), totalInterest, totalMin };
}

/* ================ AI INSIGHTS (Anthropic via backend proxy) ================
   The Anthropic API key now lives only on the backend Worker as a secret.
   The browser sends prompts to /anthropic/messages on the user's Worker; the
   Worker injects the key, enforces a per-user daily cap, and forwards.
   Legacy DB.settings.anthropicKey is ignored — clearing it is fine. */
async function fetchInsight(prompt, context) {
  if (!DB.settings.backendUrl) throw new Error("AI insights now require the backend Worker. Set the backend URL in Settings.");
  const model = DB.settings.anthropicModel || "claude-haiku-4-5-20251001";
  const data = await api("/anthropic/messages", {
    method: "POST",
    body: JSON.stringify({
      model,
      max_tokens: 800,
      messages: [{
        role: "user",
        content: prompt + "\n\nData:\n```json\n" + JSON.stringify(context, null, 2) + "\n```",
      }],
    }),
  });
  if (data && data.error) throw new Error(data.error.message || data.error);
  return data.content?.map(c => c.text).join("\n") || "(no response)";
}
async function getMonthlyInsight() {
  const monthKey = todayKey().slice(0,7);
  const recent = (DB.spend||[]).filter(t => t.date.startsWith(monthKey));
  // Aggregate by category to keep payload small + private
  const byCat = {};
  for (const t of recent) {
    if (+t.amount <= 0) continue;
    const k = t.category || "Other";
    byCat[k] = (byCat[k] || 0) + (+t.amount || 0);

  const top = Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,15);
  const incomeMonth = recent.filter(t => +t.amount < 0).reduce((s,t) => s + Math.abs(+t.amount||0), 0);
